<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝒲𝒾𝓈𝒽 𝒫𝓁𝒶𝓎𝑒𝓇 ✧</title>
    <style>
        :root {
            /* 儚い夢のパレット */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --text-main: #5e5e7e; /* 濃すぎない紫 */
            --accent-soft: #dcdcf7; /* 淡い紫 */
            --accent-pink: rgba(255, 45, 85, 0.5); /* Apple Musicのピンクを儚く */
            --border-light: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 儚いグラデーション背景 */
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf9 50%, #fdf2f8 100%);
            color: var(--text-main);
            letter-spacing: 0.03em;
            overflow-x: hidden;
        }

        /* 浮遊する夢のオーブ（背景エフェクト） */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: float 15s infinite alternate ease-in-out;
        }
        .orb-1 { background: #e0e7ff; top: 10%; left: 15%; }
        .orb-2 { background: #fae8ff; bottom: 15%; right: 10%; animation-delay: -3s; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 50px); }
        }

        /* メインコンテナ（Apple Music風クリーン・レイアウト） */
        .player-card {
            width: 380px;
            max-width: 90vw;
            height: 85dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03);
            text-align: center;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* アートワーク部分 (中央に大きく) */
        .artwork-area {
            width: 260px;
            height: 260px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.1);
            position: relative;
            border: 1px solid rgba(255,255,255,0.9);
            transition: transform 0.3s ease;
        }

        .artwork-area.playing { transform: scale(1.03); }

        .artwork-area::after {
            content: "✧";
            position: absolute;
            top: 10px; right: 10px; font-size: 1.2rem; opacity: 0.4;
        }

        h1 { font-size: 1.4rem; font-weight: 600; margin: 0; letter-spacing: -0.01em; color: #000; opacity: 0.8; }
        p.artist { font-size: 1.0rem; margin: 5px 0 25px; color: var(--accent-pink); font-weight: 500; }

        /* Apple Music風プログレスバー */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            position: relative;
        }

        #progressBar {
            position: absolute;
            height: 100%;
            background: #8e8e93; /* Apple Music風のグレー */
            border-radius: 10px;
            width: 0%;
        }

        /* Apple Music風コントロール */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .btn {
            background: none;
            border: none;
            color: #1d1d1f;
            font-size: 2.2rem;
            cursor: pointer;
            padding: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.9); opacity: 0.6; }
        .play-pause { font-size: 3.8rem; }

        /* ファイル選択ボタン (消えそうな質感) */
        .add-btn {
            display: inline-block;
            margin: 0 auto 30px;
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.3s;
        }
        .add-btn:hover { background: rgba(255,255,255,0.4); letter-spacing: 0.1em; }

        /* プレイリスト部分 (下部) */
        .queue-list {
            flex-grow: 1;
            margin-top: 10px;
            overflow-y: auto;
            text-align: left;
            border-top: 1px solid rgba(0,0,0,0.03);
            border-radius: 20px 20px 0 0;
            padding: 10px 5px;
        }

        .song-item {
            padding: 14px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .song-item:hover { background: rgba(255,255,255,0.2); }
        .song-item.active { color: var(--accent-pink); font-weight: 600; }

        .song-info {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .del-icon {
            font-size: 0.8rem;
            opacity: 0.3;
            padding: 5px;
        }
        .del-icon:hover { opacity: 1; color: #ff5e5e; }

        /* スクロールバー隠し */
        .queue-list::-webkit-scrollbar { width: 0; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="player-card">
        <label for="fileInput" class="add-btn">Add Memories ｡.ﾟ</label>
        <input type="file" id="fileInput" accept=".mp3,.m4a" multiple>

        <div class="artwork-area" id="artwork">🪽</div>
        
        <div class="track-info">
            <h1 id="currentTitle">Waiting for wish...</h1>
            <p class="artist">Memory Library</p>
        </div>

        <div class="progress-container" id="progressArea">
            <div id="progressBar"></div>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn">⏮</button>
            <button class="btn play-pause" id="playBtn">▶︎</button>
            <button class="btn" id="nextBtn">⏭</button>
        </div>

        <div class="queue-list" id="queue">
            </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let db;
        let playlist = [];
        let currentIndex = -1;

        const player = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const titleDisplay = document.getElementById('currentTitle');

        // IndexedDB 初期化 (AppleMusicWishDB に変更)
        const request = indexedDB.open("AppleMusicWishDB", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "name" });
        request.onsuccess = e => { db = e.target.result; loadLibrary(); };

        // ファイル追加
        document.getElementById('fileInput').addEventListener('change', e => {
            const transaction = db.transaction(["songs"], "readwrite");
            for (let f of e.target.files) transaction.objectStore("songs").put({name: f.name, data: f});
            transaction.oncomplete = loadLibrary;
        });

        function loadLibrary() {
            db.transaction("songs").objectStore("songs").getAll().onsuccess = e => {
                playlist = e.target.result;
                renderQueue();
            };
        }

        function renderQueue() {
            const queue = document.getElementById('queue');
            queue.innerHTML = "";
            playlist.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="song-info">${song.name}</div>
                    <div class="del-icon" onclick="deleteSong(event, '${song.name}')">✕</div>
                `;
                item.onclick = () => playAtIndex(i);
                queue.appendChild(item);
            });
        }

        function playAtIndex(index) {
            if(index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const song = playlist[currentIndex];
            player.src = URL.createObjectURL(song.data);
            titleDisplay.textContent = song.name;
            document.getElementById('artwork').classList.add('playing');
            player.play();
            playBtn.textContent = "⏸";
            renderQueue();
        }

        function deleteSong(e, name) {
            e.stopPropagation();
            if(!confirm(`Delete "${name}" from memories?`)) return;
            const transaction = db.transaction(["songs"], "readwrite");
            transaction.objectStore("songs").delete(name);
            transaction.oncomplete = loadLibrary;
        }

        // --- コントロール系 ---
        playBtn.onclick = () => {
            if(player.paused) { player.play(); playBtn.textContent = "⏸"; }
            else { player.pause(); playBtn.textContent = "▶︎"; }
        };

        document.getElementById('nextBtn').onclick = () => playAtIndex((currentIndex + 1) % playlist.length);
        document.getElementById('prevBtn').onclick = () => playAtIndex((currentIndex - 1 + playlist.length) % playlist.length);
        
        // 自動次曲再生
        player.onended = () => document.getElementById('nextBtn').click();

        player.ontimeupdate = () => {
            progressBar.style.width = (player.currentTime / player.duration * 100) + "%";
        };

        // バークリックでスキップ
        document.getElementById('progressArea').onclick = e => {
            const r = e.currentTarget.getBoundingClientRect();
            player.currentTime = ((e.clientX - r.left) / r.width) * player.duration;
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
