<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music ✧</title>
    <style>
        :root {
            --apple-pink: rgba(255, 45, 85, 0.6);
            --wish-purple: rgba(167, 139, 250, 0.4);
            --glass-white: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            color: #1d1d1f;
            overflow: hidden;
        }

        /* Apple Music風のダイナミック背景 */
        .bg-blur {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: linear-gradient(150deg, #fef2f2, #e0e7ff, #fae8ff);
            filter: blur(60px);
            z-index: -1;
            transition: background 2s ease;
        }

        .player-shell {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* アートワーク (大きく中央に) */
        .artwork-card {
            width: 100%;
            aspect-ratio: 1/1;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }

        /* 曲情報 */
        .track-info {
            text-align: left;
            margin-bottom: 20px;
        }

        .track-info h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-info p {
            font-size: 1.1rem;
            margin: 4px 0;
            color: rgba(29, 29, 31, 0.6);
        }

        /* Apple Music風プログレスバー */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            margin: 20px 0;
            position: relative;
        }

        #progressBar {
            position: absolute;
            height: 100%;
            background: #6e6e73;
            border-radius: 2px;
            width: 0%;
        }

        /* 再生コントロール */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 10px;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 2.5rem;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* プレイリスト（スライドアップ風） */
        .list-container {
            flex-grow: 1;
            margin-top: 30px;
            overflow-y: auto;
            border-radius: 15px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .song-item:hover { background: rgba(255,255,255,0.3); }

        .add-music-label {
            display: inline-block;
            margin-bottom: 15px;
            color: #0071e3;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }

        /* カスタムオーディオ（隠す） */
        audio { display: none; }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="player-shell">
        <label for="fileInput" class="add-music-label">＋ 記憶を追加する</label>
        <input type="file" id="fileInput" accept=".mp3,.m4a,.wav,audio/*" multiple>

        <div class="artwork-card" id="artwork">✧</div>
        
        <div class="track-info">
            <h1 id="titleDisplay">Not Playing</h1>
            <p id="artistDisplay">Memory Library</p>
        </div>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <div class="controls">
            <button class="play-btn" id="playBtn">▶︎</button>
        </div>

        <div class="list-container">
            <div id="playlist"></div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let db;
        const player = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const titleDisplay = document.getElementById('titleDisplay');

        // IndexedDB 初期化
        const request = indexedDB.open("WishMusicDB", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "name" });
        request.onsuccess = e => { db = e.target.result; displayPlaylist(); };

        // ファイル保存
        document.getElementById('fileInput').addEventListener('change', e => {
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");
            for (const file of e.target.files) {
                store.put({ name: file.name, data: file });
            }
            transaction.oncomplete = displayPlaylist;
        });

        function displayPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = "";
            db.transaction(["songs"], "readonly").objectStore("songs").getAll().onsuccess = e => {
                e.target.result.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerHTML = `<span>${song.name}</span><span onclick="deleteSong(event, '${song.name}')" style="opacity:0.3">✕</span>`;
                    div.onclick = () => playSong(song);
                    container.appendChild(div);
                });
            };
        }

        function playSong(song) {
            const url = URL.createObjectURL(song.data);
            player.src = url;
            titleDisplay.textContent = song.name;
            player.play();
            playBtn.textContent = "⏸";
            
            // ウィッシュコアな演出：再生時にアートワークを少し光らせる
            document.getElementById('artwork').style.boxShadow = "0 15px 50px var(--wish-purple)";
        }

        function deleteSong(e, name) {
            e.stopPropagation();
            const transaction = db.transaction(["songs"], "readwrite");
            transaction.objectStore("songs").delete(name);
            transaction.oncomplete = displayPlaylist;
        }

        // 再生・一時停止の切り替え
        playBtn.onclick = () => {
            if (player.paused) {
                player.play();
                playBtn.textContent = "⏸";
            } else {
                player.pause();
                playBtn.textContent = "▶︎";
            }
        };

        // プログレスバーの更新
        player.ontimeupdate = () => {
            const per = (player.currentTime / player.duration) * 100;
            progressBar.style.width = per + "%";
        };
    </script>
</body>
</html>
