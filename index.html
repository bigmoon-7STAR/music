<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wish Player ✧</title>
    <style>
        :root {
            --apple-pink: #ff2d55;
            --glass: rgba(255, 255, 255, 0.4);
            --text: #1d1d1f;
            --sub: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0; height: 100dvh; display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, "SF Pro Display", sans-serif;
            background: linear-gradient(150deg, #f5f7fa, #e8ecf9, #fdf2f8);
            background-size: 300% 300%; animation: moveBG 15s ease infinite; overflow: hidden;
        }

        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .player-shell {
            width: 90%; max-width: 390px; height: 90vh; display: flex; flex-direction: column;
            padding: 24px; box-sizing: border-box; background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); position: relative;
        }

        /* アートワーク：Apple Music風 */
        .artwork {
            width: 100%; aspect-ratio: 1/1; background: #fff; border-radius: 20px;
            margin-bottom: 25px; display: flex; justify-content: center; align-items: center;
            font-size: 6rem; box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }
        .artwork.playing { transform: scale(1.05); }

        .info h1 { font-size: 1.4rem; margin: 0; font-weight: 700; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 1.1rem; margin: 4px 0; color: var(--apple-pink); font-weight: 500; opacity: 0.8; }

        /* プログレスバー */
        .slider-bg { width: 100%; height: 5px; background: rgba(0,0,0,0.08); border-radius: 10px; margin: 25px 0; cursor: pointer; position: relative; }
        #fill { height: 100%; background: #6e6e73; width: 0%; border-radius: 10px; pointer-events: none; }

        /* コントロール */
        .controls { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 20px; }
        .btn { background: none; border: none; cursor: pointer; font-size: 2.2rem; color: #1d1d1f; }
        .play-pause { font-size: 4rem; width: 80px; }

        /* タブ切り替え */
        .tab-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .tab-btn { background: none; border: none; font-size: 0.85rem; font-weight: 600; color: var(--sub); cursor: pointer; padding: 5px 10px; border-radius: 15px; transition: 0.3s; }
        .tab-btn.active { color: var(--apple-pink); background: rgba(255, 45, 85, 0.08); }

        /* リストエリア */
        .list-area {
            flex-grow: 1; overflow-y: auto; mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
            -webkit-overflow-scrolling: touch;
        }

        .song-row {
            padding: 14px 10px; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.95rem; border-bottom: 0.5px solid rgba(0,0,0,0.03); cursor: pointer;
        }
        .active-song { color: var(--apple-pink); font-weight: 600; }
        .del-btn { font-size: 0.8rem; opacity: 0.3; padding: 10px; }

        .add-lib { position: absolute; top: 25px; right: 25px; color: #0071e3; cursor: pointer; font-size: 0.85rem; font-weight: 600; z-index: 10; }
    </style>
</head>
<body>

<div class="player-shell">
    <label for="fileInput" class="add-lib">Add +</label>
    <input type="file" id="fileInput" accept=".mp3,.m4a" multiple style="display:none">

    <div class="artwork" id="art">✧</div>

    <div class="info">
        <h1 id="title">Waiting for wish...</h1>
        <p id="artist">Wish Library</p>
    </div>

    <div class="slider-bg" id="trackBox">
        <div id="fill"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevSong()">⏮</button>
        <button class="btn play-pause" id="playBtn" onclick="togglePlay()">▶︎</button>
        <button class="btn" onclick="nextSong()">⏭</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tabLib" onclick="switchTab('lib')">ライブラリ</button>
        <button class="tab-btn" id="tabNext" onclick="switchTab('next')">次に再生</button>
    </div>

    <div class="list-area" id="list"></div>
</div>

<audio id="audio"></audio>

<script>
    let db, allSongs = [], curIndex = -1, currentTab = 'lib';
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const fill = document.getElementById('fill');

    // データベース接続（名前を固定して安定化）
    const dbName = "WishMusicFinal";
    const req = indexedDB.open(dbName, 1);

    req.onupgradeneeded = e => {
        let dbObj = e.target.result;
        if (!dbObj.objectStoreNames.contains("songs")) {
            dbObj.createObjectStore("songs", { keyPath: "name" });
        }
    };

    req.onsuccess = e => { 
        db = e.target.result; 
        loadSongs(); 
    };

    document.getElementById('fileInput').onchange = e => {
        const tx = db.transaction("songs", "readwrite");
        const store = tx.objectStore("songs");
        for(let f of e.target.files) {
            store.put({name: f.name, data: f});
        }
        tx.oncomplete = () => {
            loadSongs();
            alert("追加しました ✧");
        };
    };

    function loadSongs() {
        const tx = db.transaction("songs", "readonly");
        tx.objectStore("songs").getAll().onsuccess = e => {
            allSongs = e.target.result;
            render();
        };
    }

    function switchTab(type) {
        currentTab = type;
        document.getElementById('tabLib').classList.toggle('active', type === 'lib');
        document.getElementById('tabNext').classList.toggle('active', type === 'next');
        render();
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";

        let displayList = (currentTab === 'lib') ? allSongs : allSongs.slice(curIndex + 1);

        if(displayList.length === 0) {
            listDiv.innerHTML = `<p style="text-align:center; font-size:0.8rem; opacity:0.3; margin-top:20px;">曲がありません</p>`;
            return;
        }

        displayList.forEach((s, i) => {
            const actualIndex = (currentTab === 'lib') ? i : curIndex + 1 + i;
            const row = document.createElement('div');
            row.className = `song-row ${actualIndex === curIndex ? 'active-song' : ''}`;
            row.innerHTML = `<span style="flex-grow:1">${s.name}</span><span class="del-btn" onclick="deleteSong(event, '${s.name}')">✕</span>`;
            row.onclick = () => playAt(actualIndex);
            listDiv.appendChild(row);
        });
    }

    function playAt(i) {
        if(i < 0 || i >= allSongs.length) return;
        curIndex = i;
        const song = allSongs[curIndex];
        
        if (audio.src) URL.revokeObjectURL(audio.src);
        audio.src = URL.createObjectURL(song.data);
        
        document.getElementById('title').textContent = song.name;
        document.getElementById('art').classList.add('playing');
        audio.play();
        playBtn.textContent = "⏸";
        render();
    }

    function togglePlay() {
        if(!audio.src && allSongs.length > 0) return playAt(0);
        if(audio.paused) { audio.play(); playBtn.textContent = "⏸"; }
        else { audio.pause(); playBtn.textContent = "▶︎"; }
    }

    function nextSong() { playAt((curIndex + 1) % allSongs.length); }
    function prevSong() { playAt((curIndex - 1 + allSongs.length) % allSongs.length); }

    function deleteSong(e, name) {
        e.stopPropagation();
        if(!confirm("削除しますか？")) return;
        const tx = db.transaction("songs", "readwrite");
        tx.objectStore("songs").delete(name);
        tx.oncomplete = loadSongs;
    }

    audio.ontimeupdate = () => {
        if(audio.duration) {
            fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        }
    };
    
    audio.onended = nextSong;

    document.getElementById('trackBox').onclick = e => {
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    };
</script>
</body>
</html>
