    }

    function previewPlImg(e) {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = (ev) => {
                tempPlImg = ev.target.result;
                document.getElementById('pl-edit-img').src = tempPlImg;
            };
            r.readAsDataURL(f);
        }
    }

    function deletePlaylist(id) {
        if (confirm("Delete this playlist?")) {
            db.transaction("playlists", "readwrite").objectStore("playlists").delete(id).onsuccess = loadAll;
        }
    }

    function removeTrackFromPlaylist(sid) {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        pl.songIds = pl.songIds.filter(id => id !== sid);
        db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
    }

    // BULK ADD TO PLAYLIST
    function openBulkAddModal() {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        const div = document.createElement('div');
        div.id = "bulk-modal";
        div.className = "modal";
        div.style.display = "flex";
        div.innerHTML = `
            <div class="header">
                <div class="header-top">
                    <div class="header-left-group">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <h2>Select Songs</h2>
                    <div class="header-right-group">
                        <button class="action-btn-head" onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">Done</button>
                    </div>
                </div>
            </div>
            <div class="search-container">
                <div class="search-bar-row">
                    <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                </div>
                <div id="bulk-artist-suggestions"></div>
            </div>
            <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px; background: var(--modal-bg);">
                ${tracks.map(t => `
                <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist.toLowerCase()}">
                    <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id) ? 'checked' : ''}>
                    <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                    <div style="flex:1;">
                        <b style="font-size:14px; color:var(--text-main);">${t.name}</b><br>
                        <span style="font-size:11px; color:var(--icon-color);">${t.artist}</span>
                    </div>
                </label>`).join('')}
            </div>`;
        document.body.appendChild(div);
    }

    function filterBulk(val) {
        const v = val.toLowerCase();
        const items = document.querySelectorAll('#bulk-list .check-item');
        items.forEach(el => {
            el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none';
        });
        
        const suggest = document.getElementById('bulk-artist-suggestions');
        const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
        
        if (v.length > 0 && matchedArtists.length > 0) {
            suggest.style.display = 'flex';
            suggest.innerHTML = matchedArtists.map(a => {
                const firstSong = tracks.find(t => t.artist.includes(a));
                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
            }).join('');
        } else {
            suggest.style.display = 'none';
        }
    }

    function saveBulkAdd() {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
        pl.songIds = newIds;
        db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
            loadAll();
            document.getElementById('bulk-modal').remove();
        };
    }

    // ARTIST SETUP & LINKING
    function selectArtistIcon(name) {
        editingArtistName = name;
        document.getElementById('artist-icon-upload').click();
    }

    function saveArtistIcon(e) {
        const f = e.target.files[0];
        if (f && editingArtistName) {
            const r = new FileReader();
            r.onload = (ev) => {
                let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [] };
                meta.icon = ev.target.result;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll;
            };
            r.readAsDataURL(f);
        }
    }

    function openArtistSetup(a) {
        const meta = artistMeta[a] || { name: a, members: [] };
        if (!meta.members) meta.members = [];
        editingArtistSetupName = a;
        currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
        renderArtistSetup();
        document.getElementById('artist-setup-modal').style.display = 'flex';
    }

    function renderArtistSetup() {
        const body = document.getElementById('artist-setup-body');
        body.innerHTML = `
            <span class="field-label">Artist Name</span>
            <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
            
            <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">${i18n[currentLang]['addMember']}</button>
            </div>
            
            <div id="artist-members-list" style="position:relative;">
                ${currentMembersEdit.map((m, i) => `
                    <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                        <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                        <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                            <i class="fa-solid fa-link" style="color:${m.linked ? 'var(--icon-active)' : '#ccc'}; padding:0 5px; font-size:18px;" onclick="openSyncModal(${i})"></i>
                            <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab; font-size:18px;"></i>
                            <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px; padding:0; cursor:pointer;">
                            <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 12px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function addArtistMember() {
        currentMembersEdit.push({ name: '', color: '#a6cbe3', linked: null });
        renderArtistSetup();
    }

    function removeArtistMember(i) {
        currentMembersEdit.splice(i, 1);
        renderArtistSetup();
    }

    let draggedMemIndex = -1;
    
    function handleDragStart(e, i) {
        draggedMemIndex = i;
        e.dataTransfer.effectAllowed = 'move';
        e.target.classList.add('dragging');
    }
    
    function handleDragOver(e, i) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }
    
    function handleDrop(e, i) {
        e.stopPropagation();
        if (draggedMemIndex !== i && draggedMemIndex !== -1) {
            let temp = currentMembersEdit[draggedMemIndex];
            currentMembersEdit.splice(draggedMemIndex, 1);
            currentMembersEdit.splice(i, 0, temp);
            renderArtistSetup();
        }
    }
    
    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        draggedMemIndex = -1;
    }

    function openSyncModal(i) {
        currentSyncIndex = i;
        let artists = getAllArtists();
        const body = document.getElementById('artist-sync-body');
        
        body.innerHTML = artists.map(a => {
            let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}">` : ``;
            return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
        }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color); border-color:var(--del-color);">${i18n[currentLang]['unlink']}</div>`;
        
        document.getElementById('artist-sync-modal').style.display = 'flex';
    }

    function linkArtistMember(a) {
        if (currentSyncIndex !== -1) {
            currentMembersEdit[currentSyncIndex].linked = a || null;
            if (a) {
                if (!currentMembersEdit[currentSyncIndex].name) {
                    currentMembersEdit[currentSyncIndex].name = a;
                }
                
                let aMeta = artistMeta[a];
                if (aMeta && aMeta.members && aMeta.members[0] && aMeta.members[0].color) {
                     currentMembersEdit[currentSyncIndex].color = aMeta.members[0].color;
                }
            }
            renderArtistSetup();
        }
        document.getElementById('artist-sync-modal').style.display = 'none';
    }

    function saveArtistSetup() {
        let newName = document.getElementById('setup-artist-name').value.trim();
        let oldName = editingArtistSetupName;
        
        if (newName && newName !== oldName) {
            let meta = artistMeta[oldName] || { name: oldName, members: [] };
            meta.name = newName;
            meta.members = currentMembersEdit;
            
            delete artistMeta[oldName];
            artistMeta[newName] = meta;
            
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

            let tx = db.transaction("songs", "readwrite");
            let store = tx.objectStore("songs");
            let tracksChanged = false;
            
            tracks.forEach(t => {
                let parsed = parseArtistString(t.artist);
                let changed = false;
                
                for (let i = 0; i < parsed.main.length; i++) {
                    if (parsed.main[i] === oldName) { parsed.main[i] = newName; changed = true; }
                }
                for (let i = 0; i < parsed.sub.length; i++) {
                    if (parsed.sub[i] === oldName) { parsed.sub[i] = newName; changed = true; }
                }
                
                if (changed) {
                    t.artist = stringifyArtist(parsed.main, parsed.sub);
                    store.put(t);
                    tracksChanged = true;
                }
            });
            
            if (currentArtist === oldName) currentArtist = newName;
            document.getElementById('artist-setup-modal').style.display = 'none';
            if (tracksChanged) tx.oncomplete = loadAll; else loadAll();

        } else {
            let meta = artistMeta[oldName] || { name: oldName };
            meta.members = currentMembersEdit;
            artistMeta[oldName] = meta;
            
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                document.getElementById('artist-setup-modal').style.display = 'none';
                loadAll();
            };
        }
    }

    // LYRIC SYNCER ENGINE
    function openLyricSyncer() {
        const rawText = document.getElementById('edit-lyrics-raw').value;
        const t = tracks.find(x => x.id === editingId);
        
        // Re-parse if text changed
        let lines = rawText.split('\n');
        syncDataEdit = [];
        
        // Try to merge with existing data if length matches
        if (t.lyricData && t.lyricData.length === lines.length) {
            syncDataEdit = JSON.parse(JSON.stringify(t.lyricData));
            for(let i=0; i<lines.length; i++) syncDataEdit[i].text = lines[i];
        } else {
            syncDataEdit = lines.map(l => ({ time: 0, text: l, colors: [] }));
        }
        
        renderLyricSyncerLines();
        document.getElementById('lyric-sync-modal').style.display = 'flex';
        
        // Load audio into syncer context
        if (t.data) {
            if (!blobCache[t.id]) blobCache[t.id] = URL.createObjectURL(t.data);
            if (audio.src !== blobCache[t.id]) audio.src = blobCache[t.id];
        }
    }
    
    function renderLyricSyncerLines() {
        const container = document.getElementById('sync-lines-container');
        
        let html = '';
        syncDataEdit.forEach((data, i) => {
            let colorDots = '';
            if (data.colors && data.colors.length > 0) {
                colorDots = data.colors.map(c => `<div class="color-dot" style="background:${c}"></div>`).join('');
            }
            
            html += `
            <div class="lyric-edit-row">
                <button class="lyric-time-btn" onclick="assignTime(${i})">${formatTime(data.time)}</button>
                <input type="text" class="lyric-text-input" value="${data.text}" oninput="syncDataEdit[${i}].text=this.value" onkeydown="if(event.key==='Enter'){ assignTime(${i+1}); event.preventDefault(); }">
                <div class="lyric-color-dots" onclick="openLyricColorSelect(${i})">${colorDots || '<i class="fa-solid fa-palette" style="color:var(--icon-color); font-size:16px;"></i>'}</div>
            </div>`;
        });
        
        container.innerHTML = html;
    }

    function assignTime(i) {
        if (i >= 0 && i < syncDataEdit.length) {
            syncDataEdit[i].time = audio.currentTime;
            renderLyricSyncerLines();
            
            // auto focus next input
            const inputs = document.querySelectorAll('#sync-lines-container .lyric-text-input');
            if (inputs[i+1]) inputs[i+1].focus();
        }
    }

    let activeColorLineIndex = -1;
    
    function openLyricColorSelect(i) {
        activeColorLineIndex = i;
        
        // Aggregate all members from Main Artists of current track
        let trackColors = [];
        mainArtistsEdit.forEach(a => {
            if (artistMeta[a] && artistMeta[a].members) {
                artistMeta[a].members.forEach(m => {
                    if(m.color) trackColors.push({ name: m.name, color: m.color });
                });
            }
        });
        
        const container = document.getElementById('color-palette-container');
        if (trackColors.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:var(--sub-text);">No members found in Main Artist. Setup members in Artist tab first.</div>`;
        } else {
            let currentColors = syncDataEdit[i].colors || [];
            
            container.innerHTML = trackColors.map(c => {
                const isSel = currentColors.includes(c.color);
                return `
                <div onclick="toggleLyricColor('${c.color}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; width:60px; transform: scale(${isSel?1.1:1}); transition:0.2s; opacity:${isSel?1:0.6};">
                    <div style="width:40px; height:40px; border-radius:50%; background:${c.color}; border:3px solid ${isSel?'var(--text-main)':'transparent'}; box-shadow:0 4px 10px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:6px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${c.name}</span>
                </div>`;
            }).join('') + `
            <div onclick="syncDataEdit[${activeColorLineIndex}].colors=[]; renderLyricSyncerLines(); document.getElementById('lyric-color-modal').style.display='none';" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; width:60px; opacity:0.8;">
                <div style="width:40px; height:40px; border-radius:50%; background:transparent; border:2px dashed var(--icon-color); display:flex; align-items:center; justify-content:center; color:var(--icon-color);"><i class="fa-solid fa-xmark"></i></div>
                <span style="font-size:10px; margin-top:6px; font-weight:bold;">Clear</span>
            </div>`;
        }
        
        document.getElementById('lyric-color-modal').style.display = 'flex';
    }

    function toggleLyricColor(hex) {
        if (activeColorLineIndex !== -1) {
            let current = syncDataEdit[activeColorLineIndex].colors || [];
            if (current.includes(hex)) {
                current = current.filter(c => c !== hex);
            } else {
                current.push(hex);
            }
            syncDataEdit[activeColorLineIndex].colors = current;
            openLyricColorSelect(activeColorLineIndex); // re-render palette
            renderLyricSyncerLines();
        }
    }

    function saveLyricSync() {
        const t = tracks.find(x => x.id === editingId);
        t.lyricData = JSON.parse(JSON.stringify(syncDataEdit));
        t.lyrics = syncDataEdit.map(d => d.text).join('\n');
        
        document.getElementById('edit-lyrics-raw').value = t.lyrics;
        
        document.getElementById('lyric-sync-modal').style.display = 'none';
    }

    // QUEUE LOGIC
    function toggleQueue() {
        document.getElementById('queue-panel').classList.toggle('open');
        renderQueue();
    }
    
    function renderQueue() {
        const list = document.getElementById('queue-list');
        const nextTracks = playingTracks.slice(currentTrackIdx + 1);
        if (nextTracks.length === 0) {
            list.innerHTML = '<div style="padding:50px; text-align:center; color:var(--sub-text); font-weight:bold;">Queue is empty</div>';
        } else {
            list.innerHTML = nextTracks.map((t, i) => `
            <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx + 1 + i}; loadTrack(playingTracks[currentTrackIdx])">
                <img src="${t.cover||''}" style="width:44px; height:44px;">
                <div>
                    <div style="font-weight:800; font-size:14px; color:var(--text-main);">${t.name}</div>
                    <div style="font-size:11px; color:var(--icon-color);">${t.artist}</div>
                </div>
            </div>`).join('');
        }
    }

    // FILE UPLOAD
    document.getElementById('audio-upload').onchange = (e) => {
        const files = e.target.files;
        if (files.length === 0) return;
        
        for (let f of files) {
            jsmediatags.read(f, {
                onSuccess: (tag) => {
                    let c = null;
                    if (tag.tags.picture) {
                        let d = tag.tags.picture.data;
                        let s = "";
                        for (let i = 0; i < d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    const tx = db.transaction("songs", "readwrite");
                    tx.objectStore("songs").add({
                        name: tag.tags.title || f.name,
                        artist: tag.tags.artist || "Unknown",
                        year: tag.tags.year || "",
                        cover: c,
                        data: f,
                        lyrics: "",
                        lyricData: []
                    });
                    tx.oncomplete = () => loadAll();
                },
                onError: () => {
                    const tx = db.transaction("songs", "readwrite");
                    tx.objectStore("songs").add({
                        name: f.name,
                        artist: "Unknown",
                        year: "",
                        cover: null,
                        data: f,
                        lyrics: "",
                        lyricData: []
                    });
                    tx.oncomplete = () => loadAll();
                }
            });
        }
    };

    // TOUCH GESTURES (Swipe to Delete)
    let touchStartX = 0;
    
    function handleTouchStart(e, id) {
        if (isEditing) return;
        touchStartX = e.touches[0].clientX;
    }
    
    function handleTouchMove(e, id) {
        if (isEditing) return;
        let moveX = e.touches[0].clientX - touchStartX;
        const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
        const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
        
        if (el && moveX < 0) {
            el.style.transform = `translateX(${Math.max(moveX, -85)}px)`;
            el.style.transition = "none";
            if (btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
        }
    }
    
    function handleTouchEnd(e, id) {
        if (isEditing) return;
        const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
        const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
        
        if (!el) return;
        
        let moveX = e.changedTouches[0].clientX - touchStartX;
        el.style.transition = "transform 0.4s ease";
        
        if (moveX < -40) {
            el.style.transform = `translateX(-85px)`;
            if (btn) btn.style.opacity = 1;
        } else {
            el.style.transform = `translateX(0)`;
            if (btn) btn.style.opacity = 0;
        }
    }
</script>

</body>
</html>
