                        list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    }
                    renderListItems(list, display, currentSort, currentDir);
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = i18nDict[currentLang]["playlists"] || "Playlists"; 
                    display.className = "grid";
                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                            const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                        });
                    });
                    
                    if (searchTerms.length > 0) {
                        const matchedTags = allTags.filter(t => searchTerms.every(term => t.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(t => `<div class="tag-chip" onclick="document.getElementById('search-input').value='${t}'; handleSearchInput();">#${t}</div>`).join('');
                        }
                    }
                    
                    let list = playlists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));
                    
                    if(list.find(p=>p.isAuto)) {
                        list.find(p=>p.isAuto).songIds = tracks.filter(t=>t.favorite).map(t=>t.id);
                    }

                    if (currentSort === 'name') list.sort((a,b) => currentDir * a.name.localeCompare(b.name,'ja'));
                    else if (currentSort === 'added') list.sort((a,b) => currentDir * (b.id - a.id));

                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        let delHtml = p.isAuto ? '' : `<div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>`;
                        
                        return `<div class="card ${isEditing && !p.isAuto?'editing':''}" onclick="isEditing && !p.isAuto?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            ${delHtml}
                            <img src="${p.cover || (firstSong?firstSong.cover:'IMG_8755.jpeg')}" class="card-img" onerror="this.src='IMG_8755.jpeg'">
                            ${p.favorite || p.isAuto ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    if(pl && pl.isAuto) pl.songIds = tracks.filter(t=>t.favorite).map(t=>t.id);
                    title.innerText = pl ? pl.name : ""; 
                    display.className = "list-layout";
                    
                    if(!pl) return;

                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => { 
                        let parsed = parseArtists(s.artist);
                        parsed.forEach(pa => {
                            artistsInPlRaw.push(pa.main);
                            pa.subs.forEach(su => artistsInPlRaw.push(su));
                        });
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && searchTerms.length > 0) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => t.artist.includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-active); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-active); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    if (searchTerms.length > 0) {
                        filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || t.artist.toLowerCase().includes(term)));
                    }
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => {
                            let parsed = parseArtists(t.artist);
                            return parsed.some(pa => pa.main === activeArtistFilter || pa.subs.includes(activeArtistFilter));
                        });
                    }

                    if (currentSort === 'name') filtered.sort((a,b) => currentDir * a.name.localeCompare(b.name,'ja'));
                    else if (currentSort === 'artist') filtered.sort((a,b) => currentDir * a.artist.localeCompare(b.artist,'ja'));
                    else if (currentSort === 'year') filtered.sort((a,b) => currentDir * (b.year||'').toString().localeCompare((a.year||'').toString()));
                    else if (currentSort === 'custom' && currentDir === -1) filtered.reverse();

                    let addBtnHtml = pl.isAuto ? '' : `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>`;

                    display.innerHTML = filtered.map((t, idx) => {
                        let artistHtml = formatArtistDisplay(t.artist);
                        return `
                        <div class="swipe-container" id="swipe-${t.id}">
                            ${!pl.isAuto ? `<div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>` : ''}
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.5));"></i>' : ''}
                                    <img src="${t.cover||'IMG_8755.jpeg'}" onerror="this.src='IMG_8755.jpeg'">
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:14px; margin-bottom:4px;">${t.name}</div>
                                    <div class="multi-artist-display">${artistHtml}</div>
                                </div>
                                ${currentSort==='custom' && !pl.isAuto ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`;
                    }).join('') + addBtnHtml;
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }
            
            restoreScroll();
        }

        function formatArtistDisplay(artistStr) {
            let parsed = parseArtists(artistStr);
            if (parsed.length === 0) return `<span class="main-artist-tag">Unknown</span>`;
            return parsed.map(p => {
                let html = `<span class="main-artist-tag">${p.main}</span>`;
                if(p.subs.length > 0) {
                    html += `<span class="sub-artist-tag">(${p.subs.join(', ')})</span>`;
                }
                return html;
            }).join('');
        }

        function renderListItems(list, container, sort, dir) {
            if (sort === 'name') list.sort((a,b) => dir * a.name.localeCompare(b.name,'ja'));
            else if (sort === 'artist') list.sort((a,b) => dir * a.artist.localeCompare(b.artist,'ja'));
            else if (sort === 'year') list.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
            else if (sort === 'added') list.sort((a,b) => dir * (b.id - a.id));
            
            container.innerHTML = list.map(t => {
                let artistHtml = formatArtistDisplay(t.artist);
                return `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')" style="display:flex; padding:10px; align-items:center;">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <div style="position:relative; margin-right:15px;">
                        <img src="${t.cover||'IMG_8755.jpeg'}" class="card-img" style="width:60px; height:60px; border-radius:15px; border:2px solid var(--border-color); margin:0;" onerror="this.src='IMG_8755.jpeg'">
                        ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; right:-5px; font-size:14px; z-index:10; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.5));"></i>' : ''}
                    </div>
                    <div class="card-info" style="flex:1; padding:0;">
                        <div class="card-title" style="font-size:15px; margin-bottom:5px;">${t.name}</div>
                        <div class="multi-artist-display">${artistHtml}</div>
                        ${t.year ? `<div class="card-year" style="display:inline-block; margin-top:5px;">${t.year}</div>`:''}
                    </div>
                </div>`;
            }).join('');
        }

        function moveTrack(idx, direction) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl || pl.isAuto) return;
            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            
            if ('mediaSession' in navigator && playingTracks.length > 0 && currentTrackIdx !== -1) {
                let currentPlayingId = playingTracks[currentTrackIdx].id;
                playingTracks = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                currentTrackIdx = playingTracks.findIndex(x => x.id === currentPlayingId);
            }
            
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function deleteCustomArtist(a) {
            if(confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            if (e.target.closest('#queue-panel')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            if (e.target.closest('#queue-panel')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            if (e.target.closest('#queue-panel')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s var(--apple-ease)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
        });

        let lyricData = [];
        let animationFrameId = null;

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                parseLyrics(track);
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50; transition:0.2s;"><i class="fa-solid fa-palette"></i></button>`;
                
                let linesHtml = lyricData.map((line, i) => {
                    let col = line.color || 'inherit';
                    return `<div class="lyric-line" id="lyric-line-${i}" data-index="${i}" style="color:${col};">${line.text || '&nbsp;'}</div>`;
                }).join('');
                
                view.innerHTML = paintBtn + `<div id="lyrics-content-scroll">${linesHtml}</div>`;
                startLyricAnimation();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
                cancelAnimationFrame(animationFrameId);
            }
        }

        function parseLyrics(track) {
            lyricData = [];
            if(!track || !track.lyrics) return;
            
            let lines = track.lyrics.split('\n');
            let colors = track.lyricColors || [];
            let times = track.lyricTimes || [];
            
            lines.forEach((line, i) => {
                lyricData.push({
                    text: line,
                    color: colors[i] || '',
                    time: times[i] !== undefined ? times[i] : (i * 5)
                });
            });
            
            lyricData.sort((a,b) => a.time - b.time);
        }

        function syncCurrentLyricLine(e) {
            let track = playingTracks[currentTrackIdx];
            if(!track || !track.lyrics) return;
            
            let target = e.target.closest('.lyric-line');
            if(!target) return;
            
            let index = parseInt(target.getAttribute('data-index'));
            if(isNaN(index)) return;
            
            if(!track.lyricTimes) track.lyricTimes = new Array(track.lyrics.split('\n').length).fill(null);
            track.lyricTimes[index] = audio.currentTime;
            
            db.transaction("songs", "readwrite").objectStore("songs").put(track).onsuccess = () => {
                parseLyrics(track);
                updateLyricHighlight();
            };
        }

        function startLyricAnimation() {
            const update = () => {
                updateLyricHighlight();
                animationFrameId = requestAnimationFrame(update);
            };
            update();
        }

        function updateLyricHighlight() {
            const container = document.getElementById('lyrics-content-scroll');
            if(!container) return;
            
            let currTime = audio.currentTime;
            let activeIdx = -1;
            
            for(let i = lyricData.length - 1; i >= 0; i--) {
                if(currTime >= lyricData[i].time) {
                    activeIdx = i;
                    break;
                }
            }
            
            let lines = document.querySelectorAll('.lyric-line');
            lines.forEach((el, i) => {
                if(i === activeIdx) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            
            if(activeIdx !== -1 && lines[activeIdx]) {
                let targetEl = lines[activeIdx];
                let containerCenter = container.clientHeight / 2;
                let elOffset = targetEl.offsetTop - container.offsetTop + (targetEl.clientHeight / 2);
                let scrollPos = elOffset - containerCenter;
                
                container.scrollTo({
                    top: scrollPos,
                    behavior: 'smooth'
                });
            }
        }

        function handleLyricPaste(e) {
            setTimeout(() => {
                let val = e.target.value;
                val = val.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                e.target.value = val;
            }, 10);
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                let parsed = parseArtists(playingTracks[currentTrackIdx].artist);
                if(parsed.length > 0) openArtist(parsed[0].main);
            }, 600); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if(!pl || pl.isAuto) return;
            
            const div = document.createElement('div'); 
            div.id="bulk-modal"; 
            div.className="modal"; 
            div.style.display = "flex";
            div.innerHTML = `
                <div class="header"><div class="header-top"><button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button><h2 data-i18n="select_songs">Select Songs</h2><button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);" data-i18n="done">Done</button></div></div>
                <div class="search-container"><div class="search-bar-row"><input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)"></div><div id="bulk-artist-suggestions"></div></div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => {
                        let artistHtml = formatArtistDisplay(t.artist);
                        return `
                        <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist.toLowerCase()}">
                            <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                            <img src="${t.cover||'IMG_8755.jpeg'}" onerror="this.src='IMG_8755.jpeg'" style="width:48px; height:48px; border-radius:12px; margin-right:15px; object-fit:cover;">
                            <div style="flex:1;">
                                <b style="font-size:14px; margin-bottom:4px; display:block;">${t.name}</b>
                                <div class="multi-artist-display">${artistHtml}</div>
                            </div>
                        </label>`;
                    }).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => t.artist.includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else { suggest.style.display = 'none'; }
        }

        function switchTab(v) { 
            currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; activeArtistFilter=null;
            render(); 
        }
        function openPlaylist(id) { 
            currentPlaylistId=id; 
            activeArtistFilter=null; 
            sortStates.playlistDetail = 'year'; 
            render(); 
        }
        function openArtist(n) { currentArtist=n; render(); }
        function openFull() { fPlayer.classList.add('active'); fPlayer.style.transform = 'translateY(0)'; }
        function closeFull() { fPlayer.classList.remove('active'); fPlayer.style.transform = 'translateY(100%)'; }
        
        function handleHeaderLeft() { 
            if(currentArtist) currentArtist=null; 
            else if(currentPlaylistId) currentPlaylistId=null; 
            else isEditing=!isEditing; 
            render(); 
        }
        
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => {
                    let parsed = parseArtists(t.artist);
                    return parsed.some(p => p.main === currentArtist || p.subs.includes(currentArtist));
                });
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') { const n = prompt("Playlist Name:"); if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null, favorite: false, isAuto: false }).onsuccess = loadAll; } 
            else if(currentView==='artists') { const n = prompt("Artist Name:"); if(n) db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, favorite: false, members: [], syncColor: '' }).onsuccess = loadAll; }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                fadeAudio(0, 0.5, () => {
                    audio.pause(); audio.currentTime = 0; 
                    updatePlayPauseUI(false);
                });
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }
        
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => {
                    let parsed = parseArtists(tx.artist);
                    return parsed.some(p => p.main === currentArtist || p.subs.includes(currentArtist));
                });
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            initAudioEngine();
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            audio.load();
            
            document.getElementById('m-img').src = t.cover || 'IMG_8755.jpeg'; 
            checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || 'IMG_8755.jpeg'; 
            checkMarquee('f-title', t.name); 
            
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex';
            
            const view = document.getElementById('f-lyrics-view');
            if(view.classList.contains('active')) {
                parseLyrics(t);
                let linesHtml = lyricData.map((line, i) => {
                    let col = line.color || 'inherit';
                    return `<div class="lyric-line" id="lyric-line-${i}" data-index="${i}" style="color:${col};">${line.text || '&nbsp;'}</div>`;
                }).join('');
                document.getElementById('lyrics-content-scroll').innerHTML = linesHtml;
            }
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            updateMediaSessionMetadata(t);
            
            audio.play().then(() => {
                fadeAudio(1, 0.3);
                updatePlayPauseUI(true);
            }).catch(e => {
                console.warn("Auto-play prevented", e);
                updatePlayPauseUI(false);
            });
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            else el.innerText = text;
        }
        
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        
        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
            } 
        };
        
        audio.onended = () => { next(); };

        function seekAudio(val) {
            audio.currentTime = val;
            updateMediaSessionPositionState();
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            document.getElementById('edit-artist-input').value = t.artist;
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = document.getElementById('edit-artist-input').value;
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }
        
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; }
        
        function deleteSong(id) { 
            if(confirm("Delete this track?")) {
                db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; 
            }
        }
        function deletePlaylist(id) { 
            if(confirm("Delete this playlist?")) {
                db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; 
            }
        }
        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(!pl || pl.isAuto) return;
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }
        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(!pl || pl.isAuto) return;
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { loadAll(); document.getElementById('bulk-modal').remove(); }; 
        }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }
        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function openPlEdit(id) { 
            editingPlId = id; const pl = playlists.find(p => p.id === id); 
            if(pl.isAuto) return;
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            tempPlFav = pl.favorite || false;
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || "IMG_8755.jpeg"; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            if(pl.isAuto) return;
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="appendArtistString('${a}')">${a}</div>`).join(''); 
        }
        function appendArtistString(a) {
            const el = document.getElementById('edit-artist-input');
            let val = el.value;
            if(val) el.value = val + ', ' + a;
            else el.value = a;
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }

        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, favorite: false, members: [], syncColor: '' };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [], syncColor: '' };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup(meta.syncColor);
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        function renderArtistSetup(syncCol = '') {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">+ Add Member</button>
                    </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        function addArtistMember() { currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); renderArtistSetup(''); }
        function removeArtistMember(i) { currentMembersEdit.splice(i, 1); renderArtistSetup(''); }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup('');
            }
        }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedMemIndex = -1; }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                renderArtistSetup('');
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                tracks.forEach(t => {
                    if (t.artist.includes(oldName)) {
                        t.artist = t.artist.replace(new RegExp(oldName, 'g'), newName);
                        store.put(t);
                        tracksChanged = true;
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t || !t.lyrics) return;
            
            let allMembers = [];
            let parsed = parseArtists(t.artist);
            parsed.forEach(p => {
                let meta = artistMeta[p.main];
                if(meta && meta.members) {
                    allMembers = allMembers.concat(meta.members);
                }
            });
            allMembers.push({name: 'Reset', color: ''});

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="currentPaintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function renderPaintLyrics() {
            const t = playingTracks[currentTrackIdx];
            const lines = (t.lyrics || '').split('\n');
            const colors = t.lyricColors || [];
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = lines.map((l, i) => `
                <div onclick="applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:var(--input-bg); color:${colors[i] || 'var(--text-main)'}; border-left:6px solid ${colors[i] || 'transparent'}; cursor:pointer; font-weight:800; text-align:center;">
                    ${l || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                </div>
            `).join('');
        }

        function applyLyricColor(i) {
            const t = playingTracks[currentTrackIdx];
            if(!t.lyricColors) t.lyricColors = new Array(t.lyrics.split('\n').length).fill('');
            t.lyricColors[i] = currentPaintColor;
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    parseLyrics(t);
                    let linesHtml = lyricData.map((line, i) => {
                        let col = line.color || 'inherit';
                        return `<div class="lyric-line" id="lyric-line-${i}" data-index="${i}" style="color:${col};">${line.text || '&nbsp;'}</div>`;
                    }).join('');
                    document.getElementById('lyrics-content-scroll').innerHTML = linesHtml;
                }
            };
        }

        document.getElementById('audio-upload').onchange = async (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            showLoader();

            let processedCount = 0;
            const tx = db.transaction("songs", "readwrite");
            const store = tx.objectStore("songs");

            for (let i = 0; i < files.length; i++) {
                let f = files[i];
                await new Promise((resolve) => {
                    jsmediatags.read(f, { 
                        onSuccess: (tag) => {
                            let c = null; 
                            if(tag.tags.picture){
                                let d = tag.tags.picture.data, s = ""; 
                                for(let j=0; j<d.length; j++) s += String.fromCharCode(d[j]);
                                c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                            }
                            store.add({ 
                                name: tag.tags.title || f.name, 
                                artist: tag.tags.artist || "Unknown", 
                                year: tag.tags.year || "", 
                                cover: c, 
                                data: f, 
                                lyrics: "", 
                                favorite: false 
                            });
                            resolve();
                        },
                        onError: () => {
                            store.add({ 
                                name: f.name, 
                                artist: "Unknown", 
                                year: "", 
                                cover: null, 
                                data: f, 
                                lyrics: "", 
                                favorite: false 
                            });
                            resolve();
                        }
                    });
                });
                processedCount++;
                document.getElementById('loader-text').innerText = `Processing... ${processedCount}/${files.length}`;
            }

            tx.oncomplete = () => {
                hideLoader();
                loadAll();
            };
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||'IMG_8755.jpeg'}" onerror="this.src='IMG_8755.jpeg'" style="width:40px; height:40px; object-fit:cover;">
                    <div>
                        <div style="font-weight:800; font-size:13px;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color); margin-top:2px;">${formatArtistDisplay(t.artist)}</div>
                    </div>
                </div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
