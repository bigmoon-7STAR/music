                playlistEdit: "플레이리스트", playlistName: "이름", tagLabel: "태그",
                artistSetup: "아티스트 설정", linkArtist: "링크", settingsTitle: "설정", langLabel: "언어", themeLabel: "테마", homeIconLabel: "홈 아이콘",
                themeSys: "시스템", themeLight: "라이트", themeDark: "다크", lyricSetup: "가사 설정", tabArtist: "아티스트", tabLib: "라이브러리", tabPlay: "플레이리스트",
                queueTitle: "다음 재생", close: "닫기"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'en';
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLang', lang);
            applyLanguage();
            render();
        }
        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[currentLang][key]) el.placeholder = i18n[currentLang][key];
            });
            document.getElementById('lang-select').value = currentLang;
        }

        let db, tracks = [], playlists = [], artistMeta = {};
        let isEditing = false, currentView = 'library', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        let currentPlTags = [];
        
        // Artists are stored as objects: { name: "", type: "main"|"sub" }
        let currentTrackArtists = []; 
        let currentArtTab = 'main';

        let editingArtistSetupName = null;
        let currentMembersEdit = [];
        let currentPaintColor = '';
        let currentLyricData = []; // [{ time: 0, text: "", colors: [] }]
        
        let nameInputAction = null; // callback for prompt replacement

        const audio = document.getElementById('audio-element');
        audio.volume = 1.0; // Prevent sudden volume burst

        let sortStates = { library: { type: 'added', order: 'desc' }, artists: { type: 'name', order: 'asc' }, playlist: { type: 'added', order: 'desc' }, playlistDetail: { type: 'custom', order: 'asc' } };
        let searchQueries = { artists: '', library: '', playlist: '', playlistDetail: '' };

        // Initialization
        function initTheme() {
            let mode = localStorage.getItem('themeMode') || 'system';
            document.getElementById('theme-select').value = mode;
            applyTheme(mode);
        }
        function applyTheme(mode) {
            if(mode === 'system') {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
                else document.documentElement.removeAttribute('data-theme');
            } else if(mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('themeMode', mode);
        }
        
        function loadHomeIcon() {
            let saved = localStorage.getItem('homeIcon');
            if(saved) {
                let link = document.getElementById('apple-touch-icon');
                if(link) link.href = saved;
            }
        }
        function changeHomeIcon(e) {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = ev => { localStorage.setItem('homeIcon', ev.target.result); loadHomeIcon(); }
                r.readAsDataURL(f);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadHomeIcon();
            applyLanguage();
            const req = indexedDB.open("MusicStudioWishcore_V7", 1);
            req.onupgradeneeded = (e) => {
                let d = e.target.result;
                if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
                if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
                if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
            };
            req.onsuccess = (e) => { db = e.target.result; loadAll(); };
        });

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            let c = 0;
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; if(++c===3) render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; if(++c===3) render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => artistMeta[m.name] = m);
                if(++c===3) render();
            };
        }

        function openNameInput(title, callback) {
            document.getElementById('name-input-title').innerText = title;
            document.getElementById('name-input-field').value = '';
            nameInputAction = callback;
            document.getElementById('name-input-modal').style.display = 'flex';
        }
        function closeNameInput() { document.getElementById('name-input-modal').style.display = 'none'; }
        function saveNameInput() {
            const val = document.getElementById('name-input-field').value.trim();
            if(val && nameInputAction) nameInputAction(val);
            closeNameInput();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }

        function switchTab(v) { 
            currentView = v; 
            currentArtist = null; 
            currentPlaylistId = null; 
            isEditing = false; 
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            render(); 
        }

        function handleSearchInput() {
            const val = document.getElementById('search-input').value;
            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            searchQueries[viewKey] = val;
            render();
        }

        function handleSortChange() {
            const type = document.getElementById('sort-type').value;
            const order = document.getElementById('sort-order').value;
            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            sortStates[viewKey] = { type, order };
            render();
        }

        function getAllArtistsDict() {
            // Returns { name: { isSub: boolean, parent: string|null } }
            let all = {};
            Object.keys(artistMeta).forEach(k => { all[k] = { isSub: false, parent: artistMeta[k].parent || null }; });
            tracks.forEach(t => {
                if(t.artistsObj) {
                    t.artistsObj.forEach(a => { if(!all[a.name]) all[a.name] = { isSub: a.type==='sub', parent: null }; });
                } else if(t.artist) {
                    t.artist.split(/[,/]/).forEach(a => { let x=a.trim(); if(x && !all[x]) all[x] = { isSub:false, parent:null }; });
                }
            });
            // Link children
            Object.keys(artistMeta).forEach(p => {
                if(artistMeta[p].members) {
                    artistMeta[p].members.forEach(m => {
                        if(m.linked && all[m.linked]) all[m.linked].parent = p;
                    });
                }
            });
            return all;
        }

        function getArtistIconStr(a, dict) {
            const isChild = dict && dict[a] && dict[a].parent;
            const shapeClass = isChild ? 'shape-circle' : 'shape-star';
            if(artistMeta[a] && artistMeta[a].icon) {
                return `<img src="${artistMeta[a].icon}" class="artist-icon ${shapeClass}">`;
            }
            const firstSong = tracks.find(t => (t.artistsObj||[]).some(x=>x.name===a) || (t.artist||'').includes(a));
            if(firstSong && firstSong.cover) {
                return `<img src="${firstSong.cover}" class="artist-icon ${shapeClass}">`;
            }
            return `<div class="artist-icon ${shapeClass}"><i class="fa-solid fa-user"></i></div>`;
        }

        function sortList(list, type, order) {
            let sorted = [...list];
            let dir = order === 'asc' ? 1 : -1;
            if(type === 'name') {
                sorted.sort((a,b) => (a.name||a).localeCompare(b.name||b) * dir);
            } else if(type === 'year') {
                sorted.sort((a,b) => ((a.year||'').localeCompare(b.year||'')) * dir);
            } else if(type === 'added') {
                sorted.sort((a,b) => ((a.id||0) - (b.id||0)) * dir);
            } else if(type === 'artist') {
                sorted.sort((a,b) => {
                    let aa = Array.isArray(a.artistsObj) ? a.artistsObj.map(x=>x.name).join('') : (a.artist||'');
                    let bb = Array.isArray(b.artistsObj) ? b.artistsObj.map(x=>x.name).join('') : (b.artist||'');
                    return aa.localeCompare(bb) * dir;
                });
            }
            return sorted;
        }

        function render() {
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortTypeEl = document.getElementById('sort-type');
            const sortOrderEl = document.getElementById('sort-order');
            const sortCustomOpt = document.getElementById('sort-custom-opt');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            
            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            if (artistSetupBtn) artistSetupBtn.style.display = currentArtist ? 'inline-block' : 'none';
            if (settingsBtn) settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'inline-block' : 'none';
            
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            searchInputEl.value = searchQueries[viewKey];
            
            let currentSort = sortStates[viewKey];
            if (currentView === 'playlist' && currentPlaylistId !== null) {
                sortCustomOpt.style.display = 'block';
            } else {
                sortCustomOpt.style.display = 'none';
                if(currentSort.type === 'custom') currentSort.type = 'added';
            }
            sortTypeEl.value = currentSort.type;
            sortOrderEl.value = currentSort.order;

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib').classList.add('active');

            const searchLower = searchQueries[viewKey].toLowerCase();

            if (currentView === 'library') {
                title.innerText = i18n[currentLang].libraryTitle;
                const container = document.getElementById('list-library');
                container.className = "grid";
                let list = tracks.filter(t => {
                    let artStr = Array.isArray(t.artistsObj) ? t.artistsObj.map(x=>x.name).join(' ') : (t.artist||'');
                    return t.name.toLowerCase().includes(searchLower) || artStr.toLowerCase().includes(searchLower);
                });
                list = sortList(list, currentSort.type, currentSort.order);
                renderCards(list, container);
            
            } else if (currentView === 'artists') {
                const container = document.getElementById('list-artists');
                if (!currentArtist) {
                    title.innerText = i18n[currentLang].artistsTitle; container.className = "";
                    let dict = getAllArtistsDict();
                    let artists = Object.keys(dict).filter(a => a.toLowerCase().includes(searchLower));
                    artists = sortList(artists, currentSort.type, currentSort.order);
                    
                    let html = '';
                    // Display parents first, then children
                    let rendered = new Set();
                    artists.forEach(a => {
                        if(rendered.has(a)) return;
                        if(!dict[a].parent) {
                            html += createArtistListItem(a, dict, false);
                            rendered.add(a);
                            // Find children
                            if(artistMeta[a] && artistMeta[a].members) {
                                artistMeta[a].members.forEach(m => {
                                    if(m.linked && artists.includes(m.linked) && !rendered.has(m.linked)) {
                                        html += createArtistListItem(m.linked, dict, true);
                                        rendered.add(m.linked);
                                    }
                                });
                            }
                        }
                    });
                    // render orphans
                    artists.forEach(a => {
                        if(!rendered.has(a)) html += createArtistListItem(a, dict, false);
                    });
                    container.innerHTML = html;
                } else {
                    title.innerText = currentArtist; container.className = "grid";
                    let list = tracks.filter(t => {
                        if(t.artistsObj) return t.artistsObj.some(x=>x.name===currentArtist);
                        return (t.artist||'').includes(currentArtist);
                    });
                    list = list.filter(t => t.name.toLowerCase().includes(searchLower));
                    list = sortList(list, currentSort.type, currentSort.order);
                    renderCards(list, container);
                }

            } else if (currentView === 'playlist') {
                const container = document.getElementById('list-playlist');
                if (currentPlaylistId === null) {
                    title.innerText = i18n[currentLang].playlistsTitle; container.className = "grid";
                    let list = playlists.filter(p => p.name.toLowerCase().includes(searchLower) || (p.tag && p.tag.toLowerCase().includes(searchLower)));
                    list = sortList(list, currentSort.type, currentSort.order);
                    container.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; container.className = "";
                    let plSongs = [];
                    if(currentSort.type === 'custom') {
                        let temp = [...pl.songIds];
                        if(currentSort.order === 'desc') temp.reverse();
                        temp.forEach(id => { let t=tracks.find(x=>x.id===id); if(t) plSongs.push(t); });
                    } else {
                        plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                        plSongs = sortList(plSongs, currentSort.type, currentSort.order);
                    }
                    plSongs = plSongs.filter(t => t.name.toLowerCase().includes(searchLower));

                    container.innerHTML = plSongs.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')">
                                <img src="${t.cover||''}">
                                <div style="flex:1;"><div style="font-weight:800; font-size:14px;">${t.name}</div><div style="font-size:11px; color:var(--icon-color);">${formatArtists(t)}</div></div>
                                ${currentSort.type==='custom' ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + `<div style="padding:40px; text-align:center;"><button onclick="document.getElementById('audio-upload').click()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900;">+ Add Tracks</button></div>`;
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }
        }

        function createArtistListItem(a, dict, isChild) {
            const icon = getArtistIconStr(a, dict);
            const childClass = isChild ? 'child-artist' : '';
            return `
            <div class="swipe-container">
                <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">Delete</div>
                <div class="artist-list-item ${childClass}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')">
                    <div class="artist-icon-container" style="width:48px;height:48px;">${icon}</div>
                    <div style="font-weight:800; font-size:16px; flex:1;">${a}</div>
                    <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                </div>
            </div>`;
        }

        function formatArtists(t) {
            if(t.artistsObj && t.artistsObj.length > 0) {
                let mains = t.artistsObj.filter(x=>x.type==='main').map(x=>x.name).join(' / ');
                let subs = t.artistsObj.filter(x=>x.type==='sub').map(x=>x.name).join(', ');
                if(mains && subs) return mains + " (Sub: " + subs + ")";
                return mains || subs;
            }
            return t.artist || '';
        }

        function renderCards(list, container) {
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img">
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${formatArtists(t)}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function handleHeaderLeft() { 
            if(currentArtist) currentArtist=null; 
            else if(currentPlaylistId) currentPlaylistId=null; 
            else isEditing=!isEditing; 
            render(); 
        }
        
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => (t.artistsObj||[]).some(x=>x.name===currentArtist) || (t.artist||'').includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist' && !currentPlaylistId) { 
                openNameInput("Playlist Name", (val) => {
                    db.transaction("playlists","readwrite").objectStore("playlists").add({ name: val, songIds: [], tag: "", cover: null }).onsuccess = loadAll;
                });
            } 
            else if(currentView==='artists' && !currentArtist) { 
                openNameInput("Artist Name", (val) => {
                    db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: val, icon: null, members: [] }).onsuccess = loadAll;
                });
            }
        }

        // Playback logic
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { audio.pause(); audio.currentTime = 0; return; }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                let plSongs = [];
                let sortConf = sortStates.playlistDetail;
                if(sortConf.type === 'custom') {
                    let temp = [...pl.songIds];
                    if(sortConf.order === 'desc') temp.reverse();
                    temp.forEach(sid => { let t=tracks.find(x=>x.id===sid); if(t) plSongs.push(t); });
                } else {
                    plSongs = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                    plSongs = sortList(plSongs, sortConf.type, sortConf.order);
                }
                original = plSongs;
            } else if(mode === 'art') {
                original = tracks.filter(tx => (tx.artistsObj||[]).some(x=>x.name===currentArtist) || (tx.artist||'').includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function loadTrack(t) {
            if(!t) return;
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            audio.volume = 1.0;
            document.getElementById('m-img').src = t.cover || ''; 
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || ''; 
            document.getElementById('f-title').innerText = t.name; 
            document.getElementById('f-artist').innerText = formatArtists(t);
            document.getElementById('mini').style.display = 'flex';
            currentLyricData = t.lyricData || [];
            if(document.getElementById('f-lyrics-view').classList.contains('active')) renderActiveLyrics();
            audio.play();
        }

        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function seekAudio(val) { audio.currentTime = val; }

        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                updateLyricSync(audio.currentTime);
            } 
        };
        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        audio.onended = () => { next(); };

        const fPlayer = document.getElementById('full');
        function openFull() { fPlayer.classList.add('active'); }
        
        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.1";
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.2); border:none; color:var(--icon-color); padding:10px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i> Setup</button>`;
                view.innerHTML = paintBtn + `<div id="lyric-scroll-box" style="width:100%; padding:50px 0; display:flex; flex-direction:column; gap:20px;"></div>`;
                renderActiveLyrics();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                view.innerHTML = '';
            }
        }

        function renderActiveLyrics() {
            const box = document.getElementById('lyric-scroll-box');
            if(!box) return;
            if(currentLyricData.length === 0) {
                box.innerHTML = '<div style="color:#ccc;">No lyrics setup yet.</div>';
                return;
            }
            box.innerHTML = currentLyricData.map((ld, i) => {
                let grad = '';
                if(ld.colors && ld.colors.length > 0) {
                    if(ld.colors.length === 1) grad = `color:${ld.colors[0]};`;
                    else grad = `background: linear-gradient(90deg, ${ld.colors.join(',')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                }
                return `<div id="lyr-line-${i}" class="lyric-line" style="${grad}" onclick="seekAudio(${ld.time})">${ld.text}</div>`;
            }).join('');
        }

        function updateLyricSync(time) {
            const box = document.getElementById('lyric-scroll-box');
            if(!box || currentLyricData.length === 0) return;
            let activeIdx = -1;
            for(let i=0; i<currentLyricData.length; i++) {
                if(time >= currentLyricData[i].time) activeIdx = i;
                else break;
            }
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                if(i === activeIdx) el.classList.add('active-lyric');
                else el.classList.remove('active-lyric');
            });
            if(activeIdx !== -1) {
                const el = document.getElementById(`lyr-line-${activeIdx}`);
                if(el) {
                    // Smooth scroll
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; }
        
        function openPlaylist(id) { currentPlaylistId=id; render(); }
        
        // Track Editing
        function openEdit(id) { 
            editingId = id; const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = t.artistsObj ? JSON.parse(JSON.stringify(t.artistsObj)) : (t.artist ? t.artist.split(/[,/]/).map(x=>({name:x.trim(), type:'main'})) : []);
            document.getElementById('edit-year').value = t.year || ""; 
            currentArtTab = 'main';
            updateArtTabUI();
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        
        function switchArtTab(type) {
            currentArtTab = type;
            document.getElementById('tab-main-art').classList.toggle('active', type === 'main');
            document.getElementById('tab-sub-art').classList.toggle('active', type === 'sub');
            updateArtTabUI();
        }
        function updateArtTabUI() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists.filter(x=>x.type===currentArtTab).map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${a.name} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a.name}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if(val && !currentTrackArtists.some(x=>x.name===val)) {
                currentTrackArtists.push({name: val, type: currentArtTab});
                el.value = '';
                updateArtTabUI();
            }
        }
        function removeTrackArtist(n) {
            currentTrackArtists = currentTrackArtists.filter(x => x.name !== n);
            updateArtTabUI();
        }
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const dict = getAllArtistsDict();
            container.innerHTML = Object.keys(dict).map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }

        function applyBulkLyrics() {
            const txt = document.getElementById('edit-lyrics').value;
            const lines = txt.split('\n').map(x=>x.trim()).filter(x=>x);
            const t = tracks.find(x => x.id === editingId);
            if(!t.lyricData) t.lyricData = [];
            lines.forEach(l => {
                t.lyricData.push({ time: 0, text: l, colors: [] });
            });
            document.getElementById('edit-lyrics').value = '';
            alert("Added to lyric data. Use Setup in Player to set timings.");
        }

        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artistsObj = currentTrackArtists;
            t.artist = currentTrackArtists.map(x=>x.name).join(', '); // fallback
            t.year = document.getElementById('edit-year').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }

        function deleteSong(id) { if(confirm("Delete this track?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; }
        
        // Playlist Editing
        function openPlEdit(id) { 
            editingPlId = id; const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; 
        }
        function previewPlImg(e) { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { tempPlImg = ev.target.result; document.getElementById('pl-edit-img').src = tempPlImg; }; r.readAsDataURL(f); } }
        function renderPlTags() { document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join(''); }
        function addPlTag() { const el = document.getElementById('pl-edit-tag'); const val = el.value.trim(); if(val && !currentPlTags.includes(val)) { currentPlTags.push(val); el.value = ''; renderPlTags(); } }
        function removePlTag(t) { currentPlTags = currentPlTags.filter(x => x !== t); renderPlTags(); }
        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            let allTags = new Set(); playlists.forEach(p => { if (p.tag) p.tag.split(/[,、]/).forEach(tg => { let tr=tg.trim(); if(tr) allTags.add(tr); }); });
            container.innerHTML = [...allTags].map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }
        function deletePlaylist(id) { if(confirm("Delete this playlist?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; }
        
        // Artist Setup
        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, members: [] };
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members || []));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        function closeArtistSetup() { document.getElementById('artist-setup-modal').style.display = 'none'; }
        
        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800; margin-bottom:15px;">+ Add Member</button>
                <div id="artist-members-list">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="list-item" style="background:var(--card-bg); border-radius:15px; padding:10px 15px; margin-bottom:8px; display:flex; gap:10px; align-items:center;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; cursor:pointer;" onclick="openSyncModal(${i})"></i>
                            <i class="fa-solid fa-bars" style="color:#ccc; cursor:grab;"></i>
                            <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:30px; height:30px; border:none; border-radius:50%;">
                            <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding:8px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            <i class="fa-solid fa-xmark" style="color:var(--del-color); cursor:pointer;" onclick="removeArtistMember(${i})"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        function addArtistMember() { currentMembersEdit.push({name:'', color:'#a6cbe3', linked: null}); renderArtistSetup(); }
        function removeArtistMember(i) { currentMembersEdit.splice(i, 1); renderArtistSetup(); }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) { draggedMemIndex = i; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging'); }
        function handleDragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedMemIndex = -1; }

        function openSyncModal(i) {
            let dict = getAllArtistsDict();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = Object.keys(dict).map(a => `<div class="artist-chip" onclick="linkArtistMember(${i}, '${a}')">${a}</div>`).join('') + `<div class="artist-chip" onclick="linkArtistMember(${i}, '')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        function linkArtistMember(i, a) {
            currentMembersEdit[i].linked = a || null;
            if(a && artistMeta[a] && artistMeta[a].members && artistMeta[a].members[0]) {
                currentMembersEdit[i].color = artistMeta[a].members[0].color;
            } else {
                // Auto name fill
                if(a && !currentMembersEdit[i].name) currentMembersEdit[i].name = a;
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
            renderArtistSetup();
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                tracks.forEach(t => {
                    let changed = false;
                    if(t.artistsObj) {
                        t.artistsObj.forEach(x=>{ if(x.name===oldName) {x.name=newName; changed=true;} });
                    } else if(t.artist) {
                        let arts = t.artist.split(/[,/]/).map(x=>x.trim());
                        for(let i=0; i<arts.length; i++) { if(arts[i] === oldName) { arts[i] = newName; changed = true; } }
                        if(changed) t.artist = arts.join(', ');
                    }
                    if(changed) { store.put(t); tracksChanged = true; }
                });
                if(currentArtist === oldName) currentArtist = newName;
                closeArtistSetup();
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();
            } else {
                let meta = artistMeta[oldName] || { name: oldName };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    closeArtistSetup();
                    loadAll();
                };
            }
        }

        // Lyric Paint
        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t || !t.lyricData || t.lyricData.length === 0) return;
            
            let allMembers = [];
            if(t.artistsObj) {
                t.artistsObj.filter(x=>x.type==='main').forEach(a => {
                    if(artistMeta[a.name] && artistMeta[a.name].members) allMembers = allMembers.concat(artistMeta[a.name].members);
                });
            }
            allMembers.push({name: 'Reset', color: ''});
            
            currentLyricData = JSON.parse(JSON.stringify(t.lyricData));

            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="addPaintColor('${m.color}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'};"></div>
                    <span style="font-size:10px; margin-top:4px; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        let pendingColors = [];
        function addPaintColor(c) {
            if(!c) pendingColors = [];
            else pendingColors.push(c);
            renderPaintLyrics(); // To show currently selected colors somewhere if needed
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = `<div style="text-align:center; font-size:12px; color:var(--icon-color); margin-bottom:10px;">Select colors from palette, then tap a lyric line to apply gradient. Current Selection: ${pendingColors.length>0? pendingColors.map(c=>`<span style="display:inline-block;width:10px;height:10px;background:${c};border-radius:50%;"></span>`).join(' '):'None'}</div>` + 
            currentLyricData.map((ld, i) => {
                let grad = '';
                if(ld.colors && ld.colors.length > 0) {
                    if(ld.colors.length === 1) grad = `color:${ld.colors[0]};`;
                    else grad = `background: linear-gradient(90deg, ${ld.colors.join(',')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                }
                return `
                <div class="lyric-paint-row">
                    <button onclick="setLyricTime(${i})" style="padding:10px; border-radius:8px; border:none; background:var(--accent-blue); color:var(--icon-active); font-weight:bold;">T</button>
                    <input type="number" step="0.1" value="${ld.time}" onchange="currentLyricData[${i}].time=Number(this.value)" class="lyric-time-input">
                    <div onclick="applyPendingColors(${i})" style="flex:1; padding:10px; border-radius:8px; background:var(--card-bg); font-weight:bold; cursor:pointer; ${grad}">${ld.text}</div>
                </div>`;
            }).join('');
        }
        function applyPendingColors(i) {
            currentLyricData[i].colors = [...pendingColors];
            pendingColors = [];
            renderPaintLyrics();
        }
        function setLyricTime(i) {
            currentLyricData[i].time = Math.round(audio.currentTime * 10) / 10;
            renderPaintLyrics();
            // Focus next input automatically if possible
            const inputs = document.querySelectorAll('.lyric-time-input');
            if(inputs[i+1]) inputs[i+1].focus();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) renderActiveLyrics();
            };
        }

        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `<div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])"><img src="${t.cover||''}" style="width:40px; height:40px;"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--icon-color);">${formatArtists(t)}</div></div></div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }

        // Upload
        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: tag.tags.title || f.name, artistsObj: [{name: tag.tags.artist || "Unknown", type: 'main'}], year: tag.tags.year || "", cover: c, data: f, lyricData: [] });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: f.name, artistsObj: [{name: "Unknown", type: 'main'}], year: "", cover: null, data: f, lyricData: [] });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [] };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

    </script>
</body>
</html>
