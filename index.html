<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio ✧ Wishcore</title>
    <link rel="apple-touch-icon" href="IMG_8755.jpeg">
    <link rel="icon" type="image/jpeg" href="IMG_8755.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --key-color: #ff2d55;
            --text-main: #5e5e7e;
            --sub-text: rgba(94, 94, 126, 0.6);
            --bg-color: #f5f7fa;
            --glass: rgba(255, 255, 255, 0.5);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, "SF Pro Display", sans-serif;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #e8ecf9 50%, #fdf2f8 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
        }
        .header {
            padding: calc(45px + env(safe-area-inset-top)) 20px 10px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.05); z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { font-size: 17px; font-weight: 600; color: #000; margin:0; }
        .search-container { padding: 10px 20px; display: flex; gap: 10px; }
        #search-input { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.4); outline: none; }
        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; }
        .card { position: relative; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; object-fit: cover; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #fff; }
        .card-title { margin-top:8px; font-size:13px; font-weight:600; color:#000; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .del-badge { position: absolute; top: -5px; left: -5px; width: 22px; height: 22px; background: #FF3B30; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; font-size: 10px; border: 2px solid #fff; }
        .editing .del-badge { display: flex; }
        .mini-player { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom)); left: 12px; right: 12px; height: 60px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; display: none; align-items: center; padding: 0 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 2000; border: 0.5px solid rgba(255,255,255,0.5); }
        .mini-player img { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; object-fit: cover; }
        .full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1); background: linear-gradient(150deg, #fef2f2, #e0e7ff, #fae8ff); visibility: hidden; }
        .full-player.active { transform: translateY(0); visibility: visible; }
        .f-artwork-container { flex:1; display:flex; align-items:center; justify-content:center; padding: 20px; }
        #f-img { width: 80vw; max-width: 320px; aspect-ratio:1/1; border-radius:20px; object-fit:cover; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: calc(65px + env(safe-area-inset-bottom)); background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.05); }
        .tab-item { border:none; background:none; color: var(--sub-text); font-size: 10px; font-weight: 600; display: flex; flex-direction: column; align-items: center; }
        .tab-item.active { color: var(--key-color); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 7000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
        .list-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
        #left-btn, #right-btn { background:none; border:none; color:var(--key-color); font-weight:600; font-size:16px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" onclick="handleHeaderLeft()">編集</button>
            <h2 id="view-title">ライブラリ</h2>
            <button id="right-btn" onclick="handleHeaderRight()"><i class="fa-solid fa-circle-plus"></i></button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="検索..." oninput="render()">
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src=""><div style="flex:1; font-weight:600; font-size:14px;" id="m-title"></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:24px; padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div class="full-player" id="full">
        <div onclick="closeFull()" style="padding:20px; text-align:center;"><div style="width:36px; height:5px; border-radius:3px; background:rgba(0,0,0,0.1); margin:0 auto;"></div></div>
        <div class="f-artwork-container"><img id="f-img"></div>
        <div style="padding:0 30px;">
            <div id="f-title" style="font-size:20px; font-weight:700; color:#000;"></div>
            <div id="f-artist" style="color:var(--key-color); margin-bottom:20px;"></div>
            <input type="range" style="width:100%;" id="seeker" value="0" step="0.1" oninput="audio.currentTime=this.value">
        </div>
        <div style="display:flex; justify-content:center; align-items:center; gap:40px; padding:40px 0;">
            <i class="fa-solid fa-backward-step" style="font-size:30px;" onclick="prev()"></i>
            <i id="f-pp" class="fa-solid fa-play" style="font-size:50px;" onclick="togglePlay()"></i>
            <i class="fa-solid fa-forward-step" style="font-size:30px;" onclick="next()"></i>
        </div>
    </div>

    <div id="add-song-modal" class="modal">
        <div class="header"><div class="header-top"><div></div><h2>曲を追加</h2><button onclick="closeAddSongModal()">完了</button></div></div>
        <div id="add-song-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" id="tab-lib" onclick="switchTab('library')"><i class="fa-solid fa-square-poll-vertical"></i><span>ライブラリ</span></button>
        <button class="tab-item" id="tab-play" onclick="switchTab('playlist')"><i class="fa-solid fa-music"></i><span>プレイリスト</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <audio id="audio-element"></audio>

    <script>
        const APP_VERSION = "1.2.2"; 
        if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(rs => { for(let r of rs) r.unregister(); }); }
        (function() { const u = new URL(window.location.href); if (u.searchParams.get('v') !== APP_VERSION) { u.searchParams.set('v', APP_VERSION); window.location.replace(u.href); } })();

        let db, tracks = [], playlists = [], isEditing = false, currentView = 'library', currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudio_Final_DB", 2);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath: "id", autoIncrement: true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const search = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('tab-lib').classList.toggle('active', currentView === 'library');
            document.getElementById('tab-play').classList.toggle('active', currentView === 'playlist');

            if (currentView === 'library') {
                title.innerText = "ライブラリ"; display.className = "grid";
                let filtered = tracks.filter(t => t.name.toLowerCase().includes(search));
                display.innerHTML = filtered.map(t => `<div class="card ${isEditing?'editing':''}" onclick="isEditing?deleteSong(${t.id}):playSong(${t.id},'lib')"><div class="del-badge"><i class="fa-solid fa-minus"></i></div><img src="${t.cover||''}" class="card-img"><div class="card-title">${t.name}</div></div>`).join('');
            } else if (currentPlaylistId === null) {
                title.innerText = "プレイリスト"; display.className = "grid";
                display.innerHTML = playlists.map(p => `<div class="card ${isEditing?'editing':''}" onclick="isEditing?deletePlaylist(${p.id}):openPlaylist(${p.id})"><div class="del-badge"><i class="fa-solid fa-minus"></i></div><img src="${p.cover||''}" class="card-img"><div class="card-title">${p.name}</div></div>`).join('');
            } else {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                title.innerText = pl.name; display.className = "list-view";
                let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                display.innerHTML = plSongs.map(t => `<div class="list-item" onclick="playSong(${t.id},'pl')"><img src="${t.cover||''}"><div><div style="font-weight:600;">${t.name}</div><div style="font-size:12px;color:gray;">${t.artist}</div></div></div>`).join('');
            }
        }

        function handleHeaderRight() {
            if (currentPlaylistId !== null) openAddSongModal();
            else if (currentView === 'library') document.getElementById('audio-upload').click();
            else createPlaylist();
        }

        function handleHeaderLeft() { if(currentPlaylistId!==null) { currentPlaylistId=null; isEditing=false; render(); } else { isEditing=!isEditing; render(); } }

        function switchTab(v) { currentView = v; currentPlaylistId = null; isEditing = false; render(); }
        function openPlaylist(id) { currentPlaylistId = id; isEditing = false; render(); }

        function createPlaylist() { const n = prompt("名前"); if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({name:n, cover:null, songIds:[]}).oncomplete = loadAll; }
        function deletePlaylist(id) { if(confirm("削除？")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess = loadAll; }
        function deleteSong(id) { if(confirm("消去？")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess = loadAll; }

        function openAddSongModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            document.getElementById('add-song-list').innerHTML = tracks.map(t => `<div class="list-item" onclick="toggleSongInPlaylist(${t.id})"><img src="${t.cover||''}"><div>${t.name}</div><i class="fa-solid ${pl.songIds.includes(t.id)?'fa-circle-check':'fa-circle'}" style="margin-left:auto;color:var(--key-color);"></i></div>`).join('');
            document.getElementById('add-song-modal').classList.add('active');
        }
        function toggleSongInPlaylist(sid) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if(pl.songIds.includes(sid)) pl.songIds = pl.songIds.filter(id => id !== sid); else pl.songIds.push(sid);
            if(pl.songIds.length > 0) pl.cover = tracks.find(t => t.id === pl.songIds[0]).cover;
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = openAddSongModal;
        }
        function closeAddSongModal() { document.getElementById('add-song-modal').classList.remove('active'); render(); }

        function playSong(id, mode) {
            const t = tracks.find(x => x.id === id); if(!t) return;
            playingTracks = (mode === 'pl') ? playlists.find(p => p.id === currentPlaylistId).songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x) : [...tracks];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            if(audio.src) URL.revokeObjectURL(audio.src); audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || ''; document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || ''; document.getElementById('f-title').innerText = t.name; document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex'; audio.play();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        function next() { currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length; playSong(playingTracks[currentTrackIdx].id, playingTracks.length > tracks.length ? 'pl' : 'lib'); }
        function prev() { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; playSong(playingTracks[currentTrackIdx].id, 'lib'); }
        audio.onended = next;
        audio.ontimeupdate = () => { if(!isNaN(audio.duration)) { const s = document.getElementById('seeker'); s.max = audio.duration; s.value = audio.currentTime; } };

        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }

        document.getElementById('audio-upload').onchange = (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "不明", cover: c, data: f }).oncomplete = loadAll;
                }});
            }
        };
    </script>
</body>
</html>
