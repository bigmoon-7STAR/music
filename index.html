<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝒲𝒾𝓈𝒽 𝒫𝓁𝒶𝓎𝑒𝓇 ✧</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --text-main: #5e5e7e;
            --accent-soft: #dcdcf7;
            --border-light: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf9 50%, #fdf2f8 100%);
            color: var(--text-main);
            letter-spacing: 0.05em;
            overflow-x: hidden;
        }

        /* 夢のような浮遊する光 */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite alternate;
        }
        .orb-1 { background: #e0e7ff; top: 10%; left: 10%; }
        .orb-2 { background: #fae8ff; bottom: 10%; right: 10%; animation-delay: -2s; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(20px, 40px); }
        }

        /* メインコンテナ */
        .player-card {
            width: 380px;
            max-width: 90vw;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 40px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            text-align: center;
        }

        /* アートワーク部分 (Apple Music風) */
        .artwork-area {
            width: 240px;
            height: 240px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.1);
            position: relative;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .artwork-area::after {
            content: "✧";
            position: absolute;
            top: 10px; right: 10px; font-size: 1.2rem; opacity: 0.4;
        }

        h1 { font-size: 1.2rem; font-weight: 500; margin: 0; opacity: 0.8; }
        p.artist { font-size: 0.9rem; margin: 5px 0 25px; opacity: 0.5; }

        /* Apple Music風コントロール */
        audio {
            width: 100%;
            height: 40px;
            margin-bottom: 25px;
            opacity: 0.7;
            filter: invert(10%) sepia(10%) saturate(500%) hue-rotate(200deg);
        }

        /* ファイル選択ボタン (消えそうな質感) */
        .add-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.3s;
        }
        .add-btn:hover { background: rgba(255,255,255,0.4); letter-spacing: 0.15em; }

        /* リスト部分 */
        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
            text-align: left;
            border-top: 0.5px solid rgba(0,0,0,0.05);
        }

        #playlist li {
            padding: 12px 8px;
            border-bottom: 0.5px solid rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        #playlist li:hover { background: rgba(255,255,255,0.2); }

        .song-info {
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
            opacity: 0.7;
        }

        .del-icon {
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0.3;
            padding: 5px;
        }
        .del-icon:hover { opacity: 0.8; color: #ff8e8e; }

        /* スクロールバー隠し */
        #playlist::-webkit-scrollbar { width: 0; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="player-card">
        <div class="artwork-area">🪽</div>
        
        <h1 id="currentTitle">Waiting for wish...</h1>
        <p class="artist">Your Library</p>

        <audio id="audioPlayer" controls></audio>

        <label for="fileInput" class="add-btn">Add to memories ｡.ﾟ</label>
        <input type="file" id="fileInput" accept="audio/*" multiple>
        
        <ul id="playlist"></ul>
    </div>

    <script>
        let db;
        const request = indexedDB.open("MusicDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "name" });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            displayPlaylist();
        };

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");
            for (const file of files) {
                store.put({ name: file.name, data: file });
            }
            transaction.oncomplete = () => displayPlaylist();
        });

        function displayPlaylist() {
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            const transaction = db.transaction(["songs"], "readonly");
            const store = transaction.objectStore("songs");

            store.getAll().onsuccess = (e) => {
                e.target.result.forEach(song => {
                    const li = document.createElement('li');
                    
                    const info = document.createElement('div');
                    info.className = 'song-info';
                    info.textContent = song.name;
                    info.onclick = () => playSong(song);

                    const del = document.createElement('div');
                    del.className = 'del-icon';
                    del.textContent = "✕";
                    del.onclick = () => deleteSong(song.name);

                    li.appendChild(info);
                    li.appendChild(del);
                    list.appendChild(li);
                });
            };
        }

        function playSong(song) {
            const url = URL.createObjectURL(song.data);
            const player = document.getElementById('audioPlayer');
            document.getElementById('currentTitle').textContent = song.name;
            player.src = url;
            player.play();
        }

        function deleteSong(name) {
            const transaction = db.transaction(["songs"], "readwrite");
            transaction.objectStore("songs").delete(name);
            transaction.oncomplete = () => displayPlaylist();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
