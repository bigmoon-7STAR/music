<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio ✧ Pure Wish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            /* カラーパレットの強化：ウィッシュコアを意識した配色 */
            --key-color: #ffdce5;
            --key-color-dark: #ff85a2;
            --accent-blue: #d0e9ff;
            --accent-purple: #e0d1ff;
            --text-main: #5d5d81; /* 少し濃くして可読性アップ */
            --text-wish: #8a7fb9;
            --glass: rgba(255, 255, 255, 0.45); /* 透明度を調整 */
            --glass-heavy: rgba(255, 255, 255, 0.65);
            --star-clip: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            --card-shadow: 0 12px 30px rgba(255, 180, 200, 0.25);
            --magic-glow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", sans-serif;
            background: #ffffff;
            background-image: 
                radial-gradient(circle at 10% 20%, var(--accent-blue) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--key-color) 0%, transparent 40%),
                linear-gradient(135deg, #fff5f8 0%, #f0f7ff 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        /* 背景オーブ装飾の強化 */
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(70px); z-index: -1; opacity: 0.6; animation: float 12s infinite alternate ease-in-out; }
        @keyframes float { 
            from { transform: translate(0,0) scale(1); } 
            to { transform: translate(40px, 60px) scale(1.1); } 
        }

        /* --- ボタンのアニメーション (魔法少女風) --- */
        button, i { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        button:active, i:active { transform: scale(0.85) rotate(5deg); filter: brightness(1.2); }
        
        /* キラキラエフェクト */
        .magic-btn { position: relative; overflow: hidden; }
        .magic-btn::after {
            content: '✧'; position: absolute; top: -10px; right: -10px; font-size: 10px; opacity: 0;
            transition: 0.5s;
        }
        .magic-btn:hover::after { opacity: 1; transform: translate(-15px, 15px); }

        /* --- Header --- */
        .header { 
            padding: calc(45px + env(safe-area-inset-top)) 20px 15px; 
            background: var(--glass); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-bottom: 2px solid rgba(255,255,255,0.5); 
            z-index: 100; 
        }
        .header-top h2 { 
            font-size: 20px; font-weight: 800; 
            background: linear-gradient(45deg, var(--text-main), var(--key-color-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
        }
        #right-btn i { 
            color: var(--key-color-dark); background: #fff; width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; border-radius: 50%; 
            box-shadow: 0 4px 15px rgba(255,133,162,0.2); 
            border: 2px solid var(--key-color);
        }

        /* --- Content Area --- */
        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; padding: 20px; }
        
        .card { position: relative; cursor: pointer; }
        .card-img { 
            width: 100%; aspect-ratio: 1/1; border-radius: 35px; object-fit: cover; 
            box-shadow: var(--card-shadow); border: 6px solid #fff; display: block; background: #fff;
            transition: transform 0.4s ease;
        }
        .card:hover .card-img { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(255, 180, 200, 0.4); }
        .card-title { font-size: 14px; font-weight: 800; color: var(--text-main); margin-top: 10px; }
        .card-sub { color: var(--text-wish); font-weight: 600; }
        
        .card-tag { 
            background: linear-gradient(135deg, var(--key-color), var(--accent-purple)); 
            color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* --- Mini Player (すりガラス) --- */
        .mini-player { 
            position: fixed; bottom: calc(95px + env(safe-area-inset-bottom)); left: 15px; right: 15px; height: 80px; 
            background: rgba(255, 255, 255, 0.5); /* 透け感アップ */
            backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 30px; display: none; align-items: center; padding: 0 15px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08), inset 0 0 0 1.5px rgba(255,255,255,0.6); 
            z-index: 2000; border: none; 
            animation: miniFloat 4s infinite alternate ease-in-out;
        }
        @keyframes miniFloat { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        
        #m-img { 
            width: 55px; height: 55px; border-radius: 18px; object-fit: cover; 
            border: 3px solid #fff; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            opacity: 1 !important; /* ジャケットは透けさせない */
        }

        /* --- Full Player (すりガラス) --- */
        .full-player { 
            position: fixed; inset: 0; z-index: 5000; display: flex; flex-direction: column; 
            transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); 
            visibility: hidden; 
            background: rgba(255, 255, 255, 0.4); /* 全体背景を透かす */
            backdrop-filter: blur(50px) saturate(150%); -webkit-backdrop-filter: blur(50px) saturate(150%);
        }
        .full-player.active { transform: translateY(0); visibility: visible; }

        #bg-blur-overlay { display: none; } /* すりガラス効果を使うため元の背景は非表示 */

        #f-img { 
            width: 100%; height: 100%; border-radius: 50px; object-fit: cover; 
            box-shadow: 0 40px 80px rgba(180,150,180,0.4); 
            border: 12px solid #fff;
            opacity: 1 !important; /* 絶対に透けさせない */
        }

        /* --- UI Controls --- */
        .seeker { 
            -webkit-appearance: none; width: 100%; height: 8px; 
            background: rgba(255, 255, 255, 0.5); border-radius: 15px; border: 1.5px solid #fff;
        }
        .seeker::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 24px; height: 24px; background: var(--key-color-dark); 
            border: 4px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--key-color);
        }

        #f-pp { 
            font-size: 65px; color: var(--key-color-dark); 
            filter: drop-shadow(0 5px 15px rgba(255, 133, 162, 0.4));
        }

        /* --- Tab Bar --- */
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; height: calc(85px + env(safe-area-inset-bottom)); 
            background: var(--glass-heavy); backdrop-filter: blur(30px); 
            display: flex; justify-content: space-around; padding-top: 15px; 
            border-top: 2px solid rgba(255,255,255,0.6); z-index: 1000; 
        }
        .tab-item { color: #d0d3e8; }
        .tab-item.active { 
            color: var(--key-color-dark); 
            text-shadow: 0 0 10px rgba(255,133,162,0.3);
        }

        /* 既存の機能維持用のスタイル */
        .swipe-container { position: relative; overflow: hidden; background: transparent; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 85px; background: #fff1f1; color: #ff8e8e; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
        .modal { position: fixed; inset: 0; background: #ffffff; z-index: 7000; display: none; flex-direction: column; animation: modalSlide 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        @keyframes modalSlide { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .queue-panel { position: absolute; inset: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(40px); z-index: 6000; transform: translateY(100%); transition: transform 0.7s cubic-bezier(0.2, 1, 0.2, 1); display: flex; flex-direction: column; }
        .queue-panel.open { transform: translateY(0); }
        .artist-icon { 
            width: 100%; height: 100%; object-fit: cover; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--key-color)); 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; clip-path: var(--star-clip); border: none;
        }
        .artist-icon-container { width: 72px; height: 72px; margin-right: 20px; flex-shrink: 0; filter: drop-shadow(0 10px 15px rgba(180,180,210,0.3)); position: relative; }
        .list-item { display: flex; align-items: center; padding: 16px 22px; border-bottom: 1px solid rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s; position: relative; }
        .edit-input { width: 100%; padding: 20px; border: 2px solid #f2f2f7; border-radius: 22px; margin-bottom: 24px; outline: none; font-size: 16px; background: #fbfbfc; color: var(--text-main); transition: 0.3s; }
        .del-badge { position: absolute; top: -12px; left: -12px; width: 36px; height: 36px; background: var(--key-color-dark); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 3px solid #fff; z-index: 10; font-size: 14px; box-shadow: 0 8px 20px rgba(255,126,126,0.3); }
        .editing .del-badge { display: flex; }
    </style>
</head>
<body>
    <div class="bg-orb" style="width:350px; height:350px; background:var(--accent-blue); top:-100px; left:-50px;"></div>
    <div class="bg-orb" style="width:300px; height:300px; background:var(--key-color); bottom:100px; right:-50px;"></div>
    <div class="bg-orb" style="width:200px; height:200px; background:var(--accent-purple); top:30%; right:10%;"></div>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" onclick="handleHeaderLeft()" style="color:var(--text-wish); font-weight:800; border:none; background:none;">Edit</button>
            <h2 id="view-title">Artists</h2>
            <button id="right-btn" onclick="handleHeaderRight()" style="border:none; background:none;"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
    
    <div class="search-container" style="padding: 15px 20px; display: flex; gap: 10px; align-items: center;">
        <input type="text" id="search-input" placeholder="Search with magic..." oninput="render()" style="flex: 1; padding: 12px 20px; border-radius: 25px; border: 2px solid #fff; background: rgba(255,255,255,0.6); font-size: 14px; outline: none; box-shadow: 0 8px 20px rgba(0,0,0,0.03);">
        <select id="sort-type" class="sort-select" onchange="render()" style="background: #fff; border: none; border-radius: 15px; font-size: 11px; color: var(--text-wish); padding: 10px; font-weight: 700;">
            <option value="added">Newest</option>
            <option value="name_asc">A-Z</option>
            <option value="name_desc">Z-A</option>
            <option value="year">Date</option>
        </select>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src="">
        <div id="m-title" style="flex:1; font-weight:800; font-size:15px; color:var(--text-main); margin-left: 10px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        <div style="display:flex; align-items:center; gap:5px;">
             <i id="m-pp" class="fa-solid fa-play" style="font-size:26px; color:var(--key-color-dark); padding:15px;" onclick="event.stopPropagation(); togglePlay();"></i>
        </div>
    </div>

    <div class="full-player" id="full">
        <div id="bg-blur-overlay"><div class="bg-sphere"></div></div>
        
        <div onclick="closeFull()" style="padding:30px; text-align:center;"><div style="width:50px; height:6px; border-radius:10px; background:rgba(0,0,0,0.1); margin:0 auto;"></div></div>
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px;">
            <div id="f-artwork-container" style="width: 85vw; max-width: 360px; aspect-ratio: 1/1; position: relative;">
                <img id="f-img">
                <div id="f-lyrics-view" onclick="toggleLyrics()" style="position: absolute; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 50px; padding: 40px; display: none; overflow-y: auto; text-align: center; color: var(--text-main); font-weight: 700;"></div>
            </div>
            
            <div style="width:100%; margin-top:50px; display:flex; justify-content:space-between; align-items:flex-end;">
                <div style="flex:1; overflow:hidden;">
                    <div id="f-title" style="font-size:28px; font-weight:900; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div id="f-artist" style="font-size:18px; color:var(--text-wish); margin-top:5px; font-weight:700;"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="f-lyric-btn" onclick="toggleLyrics()" style="background:rgba(255,255,255,0.6); border:none; color:var(--text-wish); border-radius:15px; width:46px; height:46px; font-size:18px;"><i class="fa-solid fa-star"></i></button>
                    <button onclick="toggleQueue()" style="background:rgba(255,255,255,0.6); border:none; color:var(--text-wish); border-radius:15px; width:46px; height:46px; font-size:18px;"><i class="fa-solid fa-list-ul"></i></button>
                </div>
            </div>
            
            <input type="range" class="seeker" id="seeker" value="0" step="0.1" oninput="audio.currentTime=this.value" style="margin-top:40px;">
            <div style="width:100%; display:flex; justify-content:space-between; color:var(--text-wish); font-size:12px; font-weight:800; margin-top:10px;">
                <span id="cur-time">0:00</span><span id="dur-time">0:00</span>
            </div>

            <div style="display:flex; width:100%; justify-content:space-between; align-items:center; margin-top:40px;">
                <button onclick="toggleShuffle()" id="btn-shuffle" style="background:none; border:none; font-size:22px; color:var(--text-wish); opacity:0.5;"><i class="fa-solid fa-shuffle"></i></button>
                <div style="display:flex; align-items:center; gap:40px;">
                    <i class="fa-solid fa-backward-step" style="font-size:32px; color:var(--text-main);" onclick="prev()"></i>
                    <i id="f-pp" class="fa-solid fa-play" onclick="togglePlay()"></i>
                    <i class="fa-solid fa-forward-step" style="font-size:32px; color:var(--text-main);" onclick="next()"></i>
                </div>
                <button onclick="toggleRepeat()" id="btn-repeat" style="background:none; border:none; font-size:22px; color:var(--text-wish); opacity:0.5; position:relative;"><i class="fa-solid fa-repeat"></i><span id="repeat-badge" style="display:none; position:absolute; top:-8px; right:-10px; background:var(--key-color-dark); color:#fff; border-radius:50%; width:18px; height:18px; font-size:10px; line-height:18px; font-weight:800;">1</span></button>
            </div>
        </div>

        <div class="queue-panel" id="queue-panel">
            <div style="padding:25px 30px; border-bottom:1.5px solid #f5f5f7; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:19px; font-weight:900;">Upcoming Magic</h3>
                <button onclick="toggleQueue()" style="background:var(--key-color); border:none; font-size:14px; color:var(--text-main); font-weight:800; padding:8px 18px; border-radius:15px;">Close</button>
            </div>
            <div id="queue-list" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="header">
            <div class="header-top">
                <button onclick="closeEdit()">Cancel</button>
                <h2 style="font-size:17px;">Track Details</h2>
                <button onclick="saveEdit()" style="color:var(--key-color-dark); font-weight:900;">Save</button>
            </div>
        </div>
        <div class="modal-body">
            <span class="field-label" style="font-size: 11px; color: var(--text-wish); font-weight: 800; display: block; margin: 10px 0;">Song Title</span>
            <input type="text" id="edit-name" class="edit-input" placeholder="e.g. Pure Wish">
            <span class="field-label" style="font-size: 11px; color: var(--text-wish); font-weight: 800; display: block; margin: 10px 0;">Artist Name</span>
            <input type="text" id="edit-artist" class="edit-input" placeholder="Artist" oninput="updateArtistSuggest(this.value)">
            <div id="artist-quick-select" style="margin-bottom: 25px;"></div>
            <span class="field-label" style="font-size: 11px; color: var(--text-wish); font-weight: 800; display: block; margin: 10px 0;">Lyrics</span>
            <textarea id="edit-lyrics" class="edit-input" style="height:200px; resize:none;" placeholder="Write lyrics..."></textarea>
        </div>
    </div>

    <div id="pl-edit-modal" class="modal">
        <div class="header">
            <div class="header-top"><button onclick="closePlEdit()">Cancel</button><h2>Playlist Settings</h2><button onclick="savePlEdit()" style="color:var(--key-color-dark); font-weight:800;">Done</button></div>
        </div>
        <div class="modal-body" style="text-align:center;">
            <img id="pl-edit-img" style="width:200px; height:200px; border-radius:40px; object-fit:cover; border:6px solid #fff; box-shadow:0 20px 40px rgba(0,0,0,0.1); margin-top:20px; cursor:pointer;" onclick="document.getElementById('pl-img-input').click()">
            <input type="file" id="pl-img-input" style="display:none" onchange="previewPlImg(event)">
            <input type="text" id="pl-edit-name" class="edit-input" style="margin-top:30px;" placeholder="Playlist Name">
            <input type="text" id="pl-edit-tag" class="edit-input" placeholder="#Tag">
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" id="tab-artist" onclick="switchTab('artists')" style="border:none; background:none; font-size:11px; font-weight:800; display:flex; flex-direction:column; align-items:center; gap:5px;"><i class="fa-solid fa-wand-magic-sparkles" style="font-size:24px;"></i><span>Artists</span></button>
        <button class="tab-item" id="tab-lib" onclick="switchTab('library')" style="border:none; background:none; font-size:11px; font-weight:800; display:flex; flex-direction:column; align-items:center; gap:5px;"><i class="fa-solid fa-gem" style="font-size:24px;"></i><span>Library</span></button>
        <button class="tab-item" id="tab-play" onclick="switchTab('playlist')" style="border:none; background:none; font-size:11px; font-weight:800; display:flex; flex-direction:column; align-items:center; gap:5px;"><i class="fa-solid fa-heart" style="font-size:24px;"></i><span>Playlists</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <input type="file" id="artist-icon-upload" style="display:none" accept="image/*" onchange="saveArtistIcon(event)">
    <audio id="audio-element"></audio>

    <script>
        // ロジックは全て継承
        let db, tracks = [], playlists = [], artistMeta = {}, isEditing = false, currentView = 'artists', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        let historyTracks = []; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudioWishcore_V4", 3);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => artistMeta[m.name] = m.icon);
                render();
            };
        }

        function sortList(list, type) {
            if (type === 'name_asc') return list.sort((a,b) => (a.name||'').localeCompare(b.name||'','ja'));
            if (type === 'name_desc') return list.sort((a,b) => (b.name||'').localeCompare(a.name||'','ja'));
            if (type === 'year') return list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
            return list;
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-type').value;

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if(tabEl) tabEl.classList.add('active');

            if (currentArtist) rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            else rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';

            if (currentView === 'library') {
                title.innerText = "Library"; display.className = "grid";
                let list = tracks.filter(t => t.name.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search));
                list = sortList(list, sort);
                display.innerHTML = list.map(t => `
                    <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                        <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash"></i></div>
                        <img src="${t.cover||''}" class="card-img">
                        <div class="card-info">
                            <div class="card-title">${t.name}</div>
                            <div class="card-sub">${t.artist} ${t.year ? `<span class="card-year" style="font-size:9px; background:rgba(0,0,0,0.05); padding:2px 6px; border-radius:8px; margin-left:5px;">${t.year}</span>`:''}</div>
                        </div>
                    </div>`).join('');
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = "Artists"; display.className = "";
                    let artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(search));
                    artists.sort((a,b) => sort === 'name_desc' ? b.localeCompare(a,'ja') : a.localeCompare(b,'ja'));

                    display.innerHTML = artists.map(a => {
                        const icon = artistMeta[a] ? `<img src="${artistMeta[a]}" class="artist-icon">` : `<div class="artist-icon"><i class="fa-solid fa-wand-sparkles"></i></div>`;
                        return `<div class="list-item" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')">
                                <div class="artist-icon-container">${icon}</div>
                                <div style="font-weight:800; font-size:18px; color:var(--text-main);">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="margin-left:auto; font-size:12px; opacity:0.3; color:var(--key-color-dark);"></i>
                            </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => t.artist === currentArtist);
                    list = sortList(list, sort);
                    display.innerHTML = list.map(t => `
                        <div class="card" onclick="playSong(${t.id},'art')">
                            <img src="${t.cover||''}" class="card-img">
                            <div class="card-info">
                                <div class="card-title">${t.name}</div>
                                <div class="card-sub">Track ${t.year ? `· ${t.year}`:''}</div>
                            </div>
                        </div>`).join('');
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = "Playlists"; display.className = "grid";
                    let list = playlists.filter(p => p.name.toLowerCase().includes(search) || (p.tag && p.tag.toLowerCase().includes(search)));
                    list = sortList(list, sort);
                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-xmark"></i></div>
                            <div style="position:relative;">
                                <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                            </div>
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                ${p.tag?`<div class="card-tag" style="margin-top:8px; display:inline-block;">${p.tag}</div>`:''}
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    display.innerHTML = plSongs.map(t => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')"
                                 ontouchstart="handleTouchStart(event, ${t.id})" ontouchmove="handleTouchMove(event, ${t.id})" ontouchend="handleTouchEnd(event, ${t.id})">
                                <img src="${t.cover||''}" style="width:58px; height:58px; border-radius:15px; border:2px solid #fff;">
                                <div style="margin-left:15px;">
                                    <div style="font-weight:800; font-size:16px; color:var(--text-main);">${t.name}</div>
                                    <div style="font-size:13px; color:var(--text-wish); margin-top:3px; font-weight:600;">${t.artist}</div>
                                </div>
                            </div>
                        </div>`).join('') + 
                        `<div style="padding:60px 20px; text-align:center;"><button onclick="openBulkAddModal()" style="background:linear-gradient(135deg, var(--key-color), var(--accent-purple)); color:#fff; border:none; padding:15px 40px; border-radius:30px; font-weight:900; box-shadow: 0 10px 20px rgba(255,180,200,0.3);">+ Summon More Tracks</button></div>`;
                }
            }
            document.getElementById('left-btn').innerText = (currentArtist || currentPlaylistId) ? "Back" : (isEditing ? "Done" : "Edit");
        }

        // --- Core Music Logic ---
        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            let nextIdx = currentTrackIdx + 1;
            if (nextIdx >= playingTracks.length) {
                if (repeatMode === 1) nextIdx = 0; 
                else { audio.pause(); audio.currentTime = 0; return; }
            }
            currentTrackIdx = nextIdx; loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            }
            else if(mode === 'art') original = tracks.filter(tx => tx.artist === currentArtist);
            else original = [...tracks];
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function loadTrack(t) {
            if(!t) return;
            if(currentTrackIdx !== -1 && !historyTracks.some(h => h.id === t.id)) {
                historyTracks.unshift(t); if(historyTracks.length > 20) historyTracks.pop();
            }
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || ''; document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || ''; document.getElementById('f-title').innerText = t.name; document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-lyrics-view').classList.remove('active');
            document.getElementById('f-img').style.opacity = "1";
            audio.play(); renderQueue();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.5"; }
        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.5"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.style.display === 'block';
            view.style.display = isActive ? 'none' : 'block';
            document.getElementById('f-img').style.opacity = isActive ? "1" : "0.1";
            if(!isActive) view.innerText = playingTracks[currentTrackIdx]?.lyrics || "No lyrics found in this memory... ✧";
        }

        function openEdit(id) { 
            editingId = id; const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            document.getElementById('edit-artist').value = t.artist; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(t.artist);
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = document.getElementById('edit-artist').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        function openPlEdit(id) { editingPlId = id; const pl = playlists.find(p => p.id === id); document.getElementById('pl-edit-name').value = pl.name; document.getElementById('pl-edit-tag').value = pl.tag || ""; tempPlImg = pl.cover; document.getElementById('pl-edit-img').src = tempPlImg || ""; document.getElementById('pl-edit-modal').style.display = 'flex'; }
        function savePlEdit() { const pl = playlists.find(p => p.id === editingPlId); pl.name = document.getElementById('pl-edit-name').value; pl.tag = document.getElementById('pl-edit-tag').value; pl.cover = tempPlImg; db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function previewPlImg(e) { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { tempPlImg = ev.target.result; document.getElementById('pl-edit-img').src = tempPlImg; }; r.readAsDataURL(f); } }

        function handleHeaderRight() { 
            if(currentArtist) {
                const artTracks = tracks.filter(t => t.artist === currentArtist);
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art');
            }
            else if(currentPlaylistId) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') {
                const n = prompt("Playlist Name:");
                if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null }).onsuccess = loadAll;
            } 
        }

        function handleHeaderLeft() { 
            if(currentArtist) currentArtist=null; 
            else if(currentPlaylistId) { if(isEditing) isEditing=false; else currentPlaylistId=null; } 
            else isEditing=!isEditing; 
            render(); 
        }

        function switchTab(v) { currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; render(); }
        function openArtist(n) { currentArtist=n; render(); }
        function openPlaylist(id) { currentPlaylistId=id; render(); }
        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            let html = "";
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if (nextTracks.length > 0) {
                html += `<div style="padding:20px 30px; font-size:11px; font-weight:900; color:var(--text-wish);">NEXT SPELL</div>`;
                html += nextTracks.map((t, i) => `<div class="list-item" onclick="jumpToQueue(${currentTrackIdx + 1 + i})"><img src="${t.cover||''}" style="width:44px; height:44px; border-radius:10px;"><div><div style="font-weight:800; font-size:15px; color:var(--text-main); margin-left:15px;">${t.name}</div></div></div>`).join('');
            }
            list.innerHTML = html || `<div style="padding:100px; text-align:center; color:#ccc; font-weight:700;">The spell ends here.</div>`;
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); div.id="bulk-modal"; div.className="modal active"; div.style.display="flex";
            let html = `<div class="header"><div class="header-top"><button onclick="this.closest('.modal').remove()">Cancel</button><h2>Select Songs</h2><button onclick="saveBulkAdd()" style="font-weight:800;">Done</button></div></div>`;
            html += `<div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:100px;">`;
            html += tracks.map(t => `<label class="list-item"><input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''} style="width:20px; height:20px; margin-right:15px;"><b style="color:var(--text-main);">${t.name}</b></label>`).join('');
            html += `</div>`;
            div.innerHTML = html; document.body.appendChild(div);
        }
        function saveBulkAdd() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            pl.songIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { document.getElementById('bulk-modal').remove(); loadAll(); };
        }

        function jumpToQueue(idx) { currentTrackIdx = idx; loadTrack(playingTracks[idx]); }
        
        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            if (moveX < 0) { el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none"; }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.5s ease";
            el.style.transform = moveX < -50 ? `translateX(-85px)` : `translateX(0)`;
        }

        function updateArtistSuggest(val) {
            const container = document.getElementById('artist-quick-select');
            const artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(val.toLowerCase())).sort();
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist').value='${a}'" style="display:inline-block; padding:8px 15px; background:#fff; border-radius:20px; margin:5px; font-size:12px; font-weight:700; border:1px solid var(--key-color); color:var(--text-wish);">${a}</div>`).join('');
        }
        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) {
            const f = e.target.files[0];
            if(f && editingArtistName) {
                const r = new FileReader();
                r.onload = (ev) => { db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({name: editingArtistName, icon: ev.target.result}).onsuccess = loadAll; };
                r.readAsDataURL(f);
            }
        }
        function deleteSong(id) { if(confirm("Remove this memory?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; }
        function deletePlaylist(id) { if(confirm("Delete this world?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; }
        function removeTrackFromPlaylist(sid) { const pl = playlists.find(p => p.id === currentPlaylistId); pl.songIds = pl.songIds.filter(id => id !== sid); db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; }

        audio.onended = () => { if(repeatMode === 2) { audio.currentTime = 0; audio.play(); } else { next(); } };
        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        audio.ontimeupdate = () => { if(!isNaN(audio.duration)){ const s = document.getElementById('seeker'); s.max = audio.duration; s.value = audio.currentTime; document.getElementById('cur-time').innerText = formatTime(audio.currentTime); document.getElementById('dur-time').innerText = formatTime(audio.duration); } };
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            const tx = db.transaction("songs", "readwrite");
            const store = tx.objectStore("songs");
            for (let f of files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    store.add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "Unknown", year: tag.tags.year || "", cover: c, data: f, lyrics: "" });
                }});
            }
            tx.oncomplete = () => { setTimeout(loadAll, 600); };
        };
    </script>
</body>
</html>
