<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Offline Web Player</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #playlist { list-style: none; padding: 0; width: 300px; }
        li { background: #333; margin: 5px 0; padding: 10px; cursor: pointer; border-radius: 5px; }
        li:hover { background: #444; }
        audio { margin-top: 20px; width: 300px; }
    </style>
</head>
<body>

    <h2>Offline Player</h2>
    <input type="file" id="fileInput" accept="audio/*" multiple>
    
    <ul id="playlist"></ul>
    
    <audio id="audioPlayer" controls></audio>

    <script>
        // 1. IndexedDBの初期化
        let db;
        const request = indexedDB.open("MusicDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "name" });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            displayPlaylist();
        };

        // 2. ファイルを保存する
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");

            for (const file of files) {
                store.put({ name: file.name, data: file });
            }

            transaction.oncomplete = () => displayPlaylist();
        });

        // 3. リスト表示と再生
        function displayPlaylist() {
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            const transaction = db.transaction(["songs"], "readonly");
            const store = transaction.objectStore("songs");

            store.getAll().onsuccess = (e) => {
                e.target.result.forEach(song => {
                    const li = document.createElement('li');
                    li.textContent = song.name;
                    li.onclick = () => playSong(song.data);
                    list.appendChild(li);
                });
            };
        }

        function playSong(blob) {
            const url = URL.createObjectURL(blob);
            const player = document.getElementById('audioPlayer');
            player.src = url;
            player.play();
        }

        // Service Workerの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
