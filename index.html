        function updateTitleTranslation() {
            const titleEl = document.getElementById('view-title');
            if(currentView === 'library') titleEl.innerText = t('library');
            else if(currentView === 'artists' && !currentArtist) titleEl.innerText = t('artists');
            else if(currentView === 'playlist' && currentPlaylistId === null) titleEl.innerText = t('playlists');
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLang', lang);
            updateUIText();
            render();
        }

        // --- State Variables ---
        let db, tracks = [], playlists = [], artistMeta = {};
        let isEditing = false, currentView = 'library', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        let currentPlTags = [], tempPlFav = false;
        
        // Artist Tagging state
        let currentMainArtists = [];
        let currentSubArtists = [];
        let isMainArtistToggle = true;

        let editingArtistSetupName = null;
        let currentMembersEdit = [];
        let currentSelectedMembersForLyric = [];
        let currentLyricData = []; // Array of { text, colors:[], time:0 }
        
        let sleepTimerId = null;
        let sleepTimerInterval = null;
        let sleepEndTime = 0;
        
        let sortStates = { artists: 'added', library: 'added', playlist: 'added', playlistDetail: 'year' };
        let sortDirs = { artists: 1, library: 1, playlist: 1, playlistDetail: 1 }; // 1: Asc, -1: Desc
        let searchQueries = { artists: '', library: '', playlist: '', playlistDetail: '', bulkAdd: '' };
        let activeArtistFilter = null; 
        let currentSyncIndex = -1;
        let scrollPositions = { library: 0, artists: 0, playlist: 0, playlistDetail: 0 };

        // For crossfade
        const audio = document.getElementById('audio-element');
        let blobUrlCache = {}; // Cache blob URLs to prevent first-song bug

        // Apple Music Lyrics Animation Loop
        let lyricsAnimId = null;
        
        // --- Init Configuration ---
        let savedFade = localStorage.getItem('lyricFadeTime') || '0.5';
        document.documentElement.style.setProperty('--lyric-fade-time', savedFade + 's');
        document.getElementById('lyric-time-input').value = savedFade;

        function saveLyricFadeTime(val) {
            document.documentElement.style.setProperty('--lyric-fade-time', val + 's');
            localStorage.setItem('lyricFadeTime', val);
        }

        function applyTheme(mode) {
            if(mode === 'system') {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { 
                    document.documentElement.setAttribute('data-theme', 'dark'); 
                    document.getElementById('meta-theme-color').content = "#000a14";
                }
                else { 
                    document.documentElement.removeAttribute('data-theme'); 
                    document.getElementById('meta-theme-color').content = "#ffffff";
                }
            } else if(mode === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('meta-theme-color').content = "#000a14";
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('meta-theme-color').content = "#ffffff";
            }
            localStorage.setItem('themeMode', mode);
            updatePlayerBlurBg();
        }
        function initTheme() {
            let mode = localStorage.getItem('themeMode') || 'system';
            document.getElementById('theme-select').value = mode;
            applyTheme(mode);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if(document.getElementById('theme-select').value === 'system') applyTheme('system');
            });
        }
        
        function loadHomeIcon() {
            let saved = localStorage.getItem('homeIcon');
            let link = document.getElementById('apple-touch-icon');
            if(saved) {
                if(link) link.href = saved;
            } else {
                if(link) link.href = 'IMG_8755.jpeg';
            }
        }
        function changeHomeIcon(e) {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = ev => { localStorage.setItem('homeIcon', ev.target.result); loadHomeIcon(); }
                r.readAsDataURL(f);
            }
        }
        function resetHomeIcon() {
            localStorage.removeItem('homeIcon');
            loadHomeIcon();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        
        function startTimer() {
            if(sleepTimerId) {
                clearTimeout(sleepTimerId);
                clearInterval(sleepTimerInterval);
                sleepTimerId = null;
                sleepTimerInterval = null;
                document.getElementById('timer-display').innerText = "";
                document.getElementById('timer-btn').innerText = t('start');
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                return;
            }
            const min = parseInt(document.getElementById('timer-input').value);
            if(isNaN(min) || min <= 0) return;
            
            sleepEndTime = Date.now() + min * 60000;
            document.getElementById('timer-btn').innerText = t('stop');
            document.getElementById('timer-btn').style.background = "var(--del-color)";
            
            sleepTimerInterval = setInterval(() => {
                let remain = sleepEndTime - Date.now();
                if(remain <= 0) {
                    clearInterval(sleepTimerInterval);
                } else {
                    let m = Math.floor(remain / 60000);
                    let s = Math.floor((remain % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `Remaining: ${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);

            sleepTimerId = setTimeout(() => {
                crossfadeVolume(0, 3000, () => {
                    audio.pause();
                    document.getElementById('timer-display').innerText = "Timer finished.";
                    document.getElementById('timer-btn').innerText = t('start');
                    document.getElementById('timer-btn').style.background = "var(--icon-color)";
                    sleepTimerId = null;
                    clearInterval(sleepTimerInterval);
                });
            }, min * 60000);
        }

        // --- IndexedDB ---
        const req = indexedDB.open("MusicStudioWishcore_V8", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { 
            db = e.target.result; 
            migrateDataIfNeeded(() => { loadAll(); });
        };
        
        function migrateDataIfNeeded(callback) {
            const tx = db.transaction(["songs"], "readwrite");
            let store = tx.objectStore("songs");
            store.getAll().onsuccess = (e) => {
                let all = e.target.result;
                let needUpdate = false;
                all.forEach(t => {
                    if(!t.mainArtists) {
                        t.mainArtists = t.artist ? t.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x) : [];
                        t.subArtists = [];
                        t.lyricData = []; // Migration for Apple Music style lyrics
                        if(t.lyrics) {
                            let lines = t.lyrics.split('\n');
                            t.lyricData = lines.map((l, i) => ({ text: l, time: 0, colors: t.lyricColors ? [t.lyricColors[i] || ''] : [] }));
                        }
                        store.put(t);
                        needUpdate = true;
                    }
                });
                if(needUpdate) tx.oncomplete = callback;
                else callback();
            };
        }

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => artistMeta[m.name] = m);
                render();
            };
        }

        // --- Scrolling & UI States ---
        function getScrollKey() {
            if(currentView === 'playlist' && currentPlaylistId !== null) return 'playlistDetail';
            return currentView;
        }
        function saveScrollPosition() {
            const c = document.getElementById('content');
            scrollPositions[getScrollKey()] = c.scrollTop;
        }
        function restoreScrollPosition() {
            const c = document.getElementById('content');
            c.scrollTop = scrollPositions[getScrollKey()] || 0;
        }

        function handleSearchInput() {
            saveScrollPosition();
            const val = document.getElementById('search-input').value;
            searchQueries[getScrollKey()] = val;
            render();
        }

        function handleSortChange() {
            saveScrollPosition();
            const val = document.getElementById('sort-type').value;
            sortStates[getScrollKey()] = val;
            render();
        }
        function toggleSortDirection() {
            saveScrollPosition();
            const key = getScrollKey();
            sortDirs[key] = sortDirs[key] === 1 ? -1 : 1;
            render();
        }
        function updateSortDirBtnText() {
            const key = getScrollKey();
            const btn = document.getElementById('sort-dir-btn');
            if(btn) btn.innerHTML = sortDirs[key] === 1 ? `<i class="fa-solid fa-arrow-up-a-z"></i> ${t('sort_asc')}` : `<i class="fa-solid fa-arrow-down-z-a"></i> ${t('sort_desc')}`;
        }

        // --- Core Render Logic ---
        function getSongArtists(t) {
            let m = t.mainArtists || [];
            let s = t.subArtists || [];
            let all = [...new Set([...m, ...s])];
            if(all.length === 0 && t.artist) all = t.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x);
            return all;
        }
        function formatArtistString(t) {
            let m = t.mainArtists || [];
            let s = t.subArtists || [];
            if(m.length === 0 && s.length === 0 && t.artist) return t.artist;
            let mStr = m.join(', ');
            let sStr = s.join(', ');
            if(mStr && sStr) return `${mStr} / ${sStr}`;
            return mStr || sStr;
        }

        function getAllArtists() {
            let allArts = new Set();
            Object.keys(artistMeta).forEach(k => allArts.add(k));
            tracks.forEach(t => { 
                getSongArtists(t).forEach(a => { if(a) allArts.add(a); });
            });
            return [...allArts].sort((a,b) => a.localeCompare(b, 'ja'));
        }

        function buildArtistHierarchy() {
            let all = getAllArtists();
            let relationships = {}; // child -> parent
            Object.keys(artistMeta).forEach(pName => {
                let pMeta = artistMeta[pName];
                if(pMeta && pMeta.members) {
                    pMeta.members.forEach(m => {
                        if(m.linked && all.includes(m.linked)) relationships[m.linked] = pName;
                    });
                }
            });
            
            let topLevel = all.filter(a => !relationships[a]);
            let list = [];
            topLevel.forEach(parent => {
                list.push({ name: parent, isParent: true, parentName: null });
                // find children
                all.forEach(child => {
                    if(relationships[child] === parent) {
                        list.push({ name: child, isParent: false, parentName: parent });
                    }
                });
            });
            return list;
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortSelectEl = document.getElementById('sort-type');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            
            updateTitleTranslation();
            updateSortDirBtnText();

            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            if (artistSetupBtn) artistSetupBtn.style.display = currentArtist ? 'inline-block' : 'none';
            if (settingsBtn) settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'inline-block' : 'none';
            
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            const viewKey = getScrollKey();
            let currentSearch = searchQueries[viewKey];
            if (searchInputEl && searchInputEl.value !== currentSearch) searchInputEl.value = currentSearch;
            
            let currentSort = sortStates[viewKey];
            if (sortSelectEl) {
                sortSelectEl.value = currentSort;
                const customOpt = document.getElementById('sort-opt-custom');
                if (currentView === 'library' || (currentView === 'artists' && !currentArtist)) {
                    customOpt.style.display = 'none';
                    if (currentSort === 'custom') {
                        currentSort = 'added';
                        sortStates[viewKey] = 'added';
                        sortSelectEl.value = 'added';
                    }
                } else {
                    customOpt.style.display = 'block';
                }
            }

            const search = currentSearch.toLowerCase();
            let searchTerms = search.split(/[\s,、]+/).filter(x => x);
            let isFavSearch = (search === "お気に入り" || search === "★");

            if (search === "お気に入り" || search === "★") {
                tagSuggest.style.display = 'flex';
                tagSuggest.innerHTML = `<div class="tag-chip" onclick="applyTagFilter('★')">★</div>`;
            }

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if(tabEl) tabEl.classList.add('active');

            if (currentView === 'library') {
                display.className = "grid";
                let list = [...tracks];
                if (isFavSearch) list = list.filter(t => t.favorite);
                else list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || formatArtistString(t).toLowerCase().includes(term)));
                
                // Show artist icons in library suggestions
                if(search.length > 0 && !isFavSearch) {
                    let matchedArts = getAllArtists().filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                    if(matchedArts.length > 0) {
                        artistFilter.style.display = 'flex';
                        artistFilter.innerHTML = matchedArts.map(a => {
                            const firstSong = tracks.find(t => getSongArtists(t).includes(a));
                            const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                            return `<div class="bulk-artist-icon-chip" onclick="applyTagFilter('${a}')">${icon}<span>${a}</span></div>`;
                        }).join('');
                    }
                }
                renderCards(list, display, currentSort, sortDirs[viewKey]);
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    display.className = "list-container";
                    let hierarchy = buildArtistHierarchy();
                    
                    if (isFavSearch) {
                        hierarchy = hierarchy.filter(h => artistMeta[h.name] && artistMeta[h.name].favorite); // Keeping this filter if it somehow is used, though fav UI is removed
                    } else {
                        hierarchy = hierarchy.filter(h => searchTerms.every(term => h.name.toLowerCase().includes(term)));
                    }

                    if(currentSort === 'name' || currentSort === 'artist') {
                        hierarchy.sort((a,b) => a.name.localeCompare(b.name, 'ja') * sortDirs[viewKey]);
                    }

                    display.innerHTML = hierarchy.map(h => {
                        const a = h.name;
                        const firstSong = tracks.find(t => getSongArtists(t).includes(a));
                        const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" class="artist-icon" data-is-parent="${h.isParent}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" class="artist-icon" data-is-parent="${h.isParent}">` : `<div class="artist-icon" data-is-parent="${h.isParent}"><i class="fa-solid fa-user" style="font-size:24px;"></i></div>`);
                        let classNames = "artist-list-item " + (h.isParent ? "" : "child-artist");
                        
                        return `
                        <div class="swipe-container" id="swipe-art-${CSS.escape(a)}">
                            <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">${t('delete')}</div>
                            <div class="${classNames}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')" ontouchstart="handleTouchStart(event, 'art-${a}')" ontouchmove="handleTouchMove(event, 'art-${a}')" ontouchend="handleTouchEnd(event, 'art-${a}')">
                                <div class="artist-icon-container" style="${h.isParent?'':'width:40px;height:40px;margin-right:10px;'}">${icon}</div>
                                <div style="font-weight:800; font-size:${h.isParent?'16px':'14px'}; flex:1;">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => getSongArtists(t).includes(currentArtist));
                    if (isFavSearch) list = list.filter(t => t.favorite);
                    else list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    renderCards(list, display, currentSort, sortDirs[viewKey]);
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    display.className = "grid";
                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                            const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                        });
                    });
                    
                    if (search.length > 0) {
                        const matchedTags = allTags.filter(tg => searchTerms.every(term => tg.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(tg => `<div class="tag-chip" onclick="applyTagFilter('${tg}')">#${tg}</div>`).join('');
                        }
                    }
                    let list = playlists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));
                    if(isFavSearch) list = list.filter(p => p.favorite);

                    if(currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name,'ja') * sortDirs[viewKey]);
                    else if(currentSort === 'year') list.sort((a,b) => (b.id - a.id) * sortDirs[viewKey]);

                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                            ${p.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "list-container";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => { artistsInPlRaw.push(...getSongArtists(s)); });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && search.length > 0 && !isFavSearch) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => getSongArtists(t).includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = [...plSongs];
                    if (isFavSearch) filtered = filtered.filter(t => t.favorite);
                    else filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || formatArtistString(t).toLowerCase().includes(term)));
                    if (activeArtistFilter) filtered = filtered.filter(t => getSongArtists(t).includes(activeArtistFilter));

                    if (currentSort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name,'ja') * sortDirs[viewKey]);
                    else if (currentSort === 'artist') filtered.sort((a,b) => formatArtistString(a).localeCompare(formatArtistString(b),'ja') * sortDirs[viewKey]);
                    else if (currentSort === 'year') filtered.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()) * sortDirs[viewKey]);
                    else if (currentSort === 'added') filtered.sort((a,b) => (b.id - a.id) * sortDirs[viewKey]);
                    else if (currentSort === 'custom' && sortDirs[viewKey] === -1) filtered.reverse();

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">${i18n[currentLang].remove}</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover||''}" style="margin-right:0;">
                                </div>
                                <div style="flex:1;"><div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div><div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${formatArtistString(t)}</div></div>
                                ${currentSort==='custom'? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${plSongs.findIndex(x=>x.id===t.id)}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${plSongs.findIndex(x=>x.id===t.id)}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px; cursor:pointer;">${t('add_tracks')}</button></div>`;
                }
            }

            if (currentArtist || currentPlaylistId !== null) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }

            restoreScrollPosition();
        }

        function renderCards(list, container, sort, dir) {
            if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name,'ja') * dir);
            else if (sort === 'artist') list.sort((a,b) => formatArtistString(a).localeCompare(formatArtistString(b),'ja') * dir);
            else if (sort === 'year') list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()) * dir);
            else if (sort === 'added') list.sort((a,b) => (b.id - a.id) * dir);
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img" alt="cover">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${formatArtistString(t)} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            saveScrollPosition();
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = render;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[getScrollKey()] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }
        
        function deleteCustomArtist(a) {
            if(confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        // --- Player Transforms & Audio Control ---
        const fPlayer = document.getElementById('full');
        let fStartY = 0, fCurrentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            fStartY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            fCurrentY = e.touches[0].clientY;
            let diff = fCurrentY - fStartY;
            if (diff > 0) fPlayer.style.transform = `translateY(${diff}px)`;
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            let diff = fCurrentY - fStartY;
            fPlayer.style.transition = 'transform var(--transition-smooth)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            fStartY = 0; fCurrentY = 0;
        });

        // --- Apple Music Lyrics Animation Logic ---
        function openAppleLyrics() {
            const view = document.getElementById('apple-lyrics-view');
            view.classList.add('active');
            renderAppleLyrics();
        }
        function closeAppleLyrics() {
            const view = document.getElementById('apple-lyrics-view');
            view.classList.remove('active');
            if(lyricsAnimId) cancelAnimationFrame(lyricsAnimId);
        }

        function renderAppleLyrics() {
            const track = playingTracks[currentTrackIdx];
            const scroller = document.getElementById('lyrics-scroller');
            
            if(!track || !track.lyricData || track.lyricData.length === 0) {
                scroller.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-dark); opacity:0.5; font-size:18px; font-weight:800;">No lyrics available.</div>`;
                return;
            }

            scroller.innerHTML = track.lyricData.map((ld, i) => {
                let gradient = 'inherit';
                if(ld.colors && ld.colors.length > 0) {
                    let validColors = ld.colors.filter(c => c);
                    if(validColors.length > 1) {
                        gradient = `linear-gradient(to right, ${validColors.join(', ')})`;
                    } else if (validColors.length === 1) {
                        gradient = validColors[0];
                    }
                }
                
                let styleStr = '';
                if(gradient.includes('gradient')) {
                    styleStr = `background: ${gradient}; -webkit-background-clip: text; color: transparent;`;
                } else if(gradient !== 'inherit') {
                    styleStr = `color: ${gradient};`;
                }

                return `<div class="lyric-line" id="lyric-line-${i}" onclick="jumpToLyricTime(${i})" style="${styleStr}">${ld.text || '&nbsp;'}</div>`;
            }).join('');

            if(lyricsAnimId) cancelAnimationFrame(lyricsAnimId);
            lyricsAnimLoop();
        }

        function lyricsAnimLoop() {
            if(!document.getElementById('apple-lyrics-view').classList.contains('active')) return;
            const track = playingTracks[currentTrackIdx];
            if(track && track.lyricData) {
                const ct = audio.currentTime;
                let activeIdx = -1;
                for(let i = 0; i < track.lyricData.length; i++) {
                    let t = track.lyricData[i].time;
                    let nextT = (i + 1 < track.lyricData.length) ? track.lyricData[i+1].time : audio.duration;
                    if(ct >= t && ct < nextT) {
                        activeIdx = i; break;
                    }
                }
                
                track.lyricData.forEach((ld, i) => {
                    const el = document.getElementById(`lyric-line-${i}`);
                    if(!el) return;
                    if(i === activeIdx) {
                        if(!el.classList.contains('active')) {
                            el.className = 'lyric-line active';
                            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    } else if (i < activeIdx) {
                        el.className = 'lyric-line past';
                    } else {
                        el.className = 'lyric-line';
                    }
                });
            }
            lyricsAnimId = requestAnimationFrame(lyricsAnimLoop);
        }

        function jumpToLyricTime(i) {
            const track = playingTracks[currentTrackIdx];
            if(track && track.lyricData && track.lyricData[i]) {
                audio.currentTime = track.lyricData[i].time;
            }
        }

        // --- View Transitions ---
        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const arts = getSongArtists(playingTracks[currentTrackIdx]);
                if(arts.length > 0) openArtist(arts[0]);
            }, 600); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); div.id="bulk-modal"; div.className="modal"; div.style.display = "flex";
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                        <h2>Select Songs</h2>
                        <button class="modal-close-btn" onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color); width:auto; padding:0 10px;">Done</button>
                    </div>
                </div>
                <div class="search-container"><div class="search-bar-row"><input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)"></div><div id="bulk-artist-suggestions"></div></div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${formatArtistString(t).toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px; object-fit:cover;">
                        <div style="flex:1;"><b style="font-size:14px;">${t.name}</b><br><span style="font-size:11px; color:var(--icon-color);">${formatArtistString(t)}</span></div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => getSongArtists(t).includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else { suggest.style.display = 'none'; }
        }

        function switchTab(v) { 
            saveScrollPosition();
            currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; activeArtistFilter=null;
            render(); 
        }
        function openPlaylist(id) { 
            saveScrollPosition();
            currentPlaylistId=id; 
            activeArtistFilter=null; 
            sortStates.playlistDetail = 'year'; 
            render(); 
        }
        function openArtist(n) { 
            saveScrollPosition();
            currentArtist=n; render(); 
        }
        function openFull() { fPlayer.classList.add('active'); fPlayer.style.transform = 'translateY(0)'; }
        function closeFull() { fPlayer.classList.remove('active'); fPlayer.style.transform = 'translateY(100%)'; }
        function handleHeaderLeft() { 
            if(currentArtist) { currentArtist=null; render(); }
            else if(currentPlaylistId !== null) { currentPlaylistId=null; render(); }
            else { isEditing=!isEditing; render(); }
        }
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => getSongArtists(t).includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId !== null) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') { 
                const n = prompt(t('pl_name') + ":"); 
                if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null, favorite: false }).onsuccess = loadAll; 
            } 
            else if(currentView==='artists') { 
                const n = prompt("Artist Name:"); 
                if(n) db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, favorite: false, members: [], syncColor: '' }).onsuccess = loadAll; 
            }
        }
        
        // --- Audio Logic with Crossfade fixes ---
        let crossfadeTimeout = null;
        function crossfadeVolume(targetVol, duration, callback) {
            let startVol = audio.volume;
            let diff = targetVol - startVol;
            let steps = 20;
            let stepTime = duration / steps;
            let stepVol = diff / steps;
            let curStep = 0;
            
            if(crossfadeTimeout) clearTimeout(crossfadeTimeout);
            
            function fade() {
                curStep++;
                let newVol = startVol + (stepVol * curStep);
                if(newVol > 1) newVol = 1;
                if(newVol < 0) newVol = 0;
                audio.volume = newVol;
                if(curStep < steps) crossfadeTimeout = setTimeout(fade, stepTime);
                else {
                    audio.volume = targetVol;
                    if(callback) callback();
                }
            }
            fade();
        }

        function togglePlay() { 
            if(audio.paused) {
                audio.volume = 1;
                audio.play(); 
            } else {
                audio.pause();
            }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); audio.currentTime = 0; 
                document.getElementById('m-pp').className = 'fa-solid fa-play'; 
                document.getElementById('f-pp').className = 'fa-solid fa-play';
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => getSongArtists(tx).includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            if(currentTrackIdx === -1) currentTrackIdx = 0; // fallback
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            // Handle blob URL cache to fix "first song play bug"
            if(!blobUrlCache[t.id]) {
                blobUrlCache[t.id] = URL.createObjectURL(t.data);
            }
            audio.src = blobUrlCache[t.id];
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = formatArtistString(t);
            
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-img').style.opacity = "1";
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            
            audio.volume = 1;
            audio.play().catch(e => console.error("Playback failed", e));

            // Setup Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.name,
                    artist: formatArtistString(t),
                    artwork: t.cover ? [{ src: t.cover, sizes: '512x512', type: 'image/jpeg' }] : []
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', prev);
                navigator.mediaSession.setActionHandler('nexttrack', next);
                navigator.mediaSession.setActionHandler('seekto', (d) => { if(d.fastSeek && ('fastSeek' in audio)) audio.fastSeek(d.seekTime); else audio.currentTime = d.seekTime; });
            }
        }

        }
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        }

        function toggleMemberSelect(idx) {
            const dot = document.getElementById(`paint-mem-dot-${idx}`);
            const col = dot.getAttribute('data-color');
            const pos = currentSelectedMembersForLyric.indexOf(col);
            if(pos > -1) {
                currentSelectedMembersForLyric.splice(pos, 1);
                dot.classList.remove('selected');
            } else {
                currentSelectedMembersForLyric.push(col);
                dot.classList.add('selected');
            }
        }
        function clearMemberSelect() {
            currentSelectedMembersForLyric = [];
            document.querySelectorAll('.member-color-dot').forEach(el => el.classList.remove('selected'));
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricData.map((ld, i) => {
                let gradient = 'transparent';
                if(ld.colors && ld.colors.length > 0) {
                    let validColors = ld.colors.filter(c => c);
                    if(validColors.length > 1) gradient = `linear-gradient(to right, ${validColors.join(', ')})`;
                    else if (validColors.length === 1) gradient = validColors[0];
                }
                
                return `
                <div style="background:var(--glass); padding:15px; border-radius:12px; border:1px solid var(--border-color); display:flex; flex-direction:column; gap:10px;">
                    <div class="lyric-time-input-row">
                        <button class="time-btn" onclick="setLyricTimeToCurrent(${i})">${t('set_time')}</button>
                        <input type="number" id="lyric-time-in-${i}" class="edit-input" style="margin:0; flex:1; padding:8px;" step="0.1" value="${ld.time || 0}" onchange="currentLyricData[${i}].time=parseFloat(this.value)" onkeydown="handleTimeInputKey(event, ${i})">
                        <span style="font-size:12px; color:var(--sub-text); font-weight:bold;">${t('seconds')}</span>
                    </div>
                    <div onclick="applyMixedColorToLyric(${i})" style="padding:15px; border-radius:12px; background:var(--input-bg); cursor:pointer; font-weight:800; text-align:center; box-shadow:inset 0 2px 5px rgba(0,0,0,0.05); position:relative;">
                        <div style="position:absolute; left:0; top:0; bottom:0; width:6px; border-radius: 12px 0 0 12px; background:${gradient};"></div>
                        <span style="background:${gradient.includes('gradient') ? gradient : 'inherit'}; -webkit-background-clip:${gradient.includes('gradient') ? 'text' : 'border-box'}; color:${gradient.includes('gradient') ? 'transparent' : (gradient!=='transparent'?gradient:'var(--text-main)')};">${ld.text || '<span style="color:#ccc; font-size:12px;">(empty)</span>'}</span>
                    </div>
                </div>
            `;
            }).join('');
        }
        function setLyricTimeToCurrent(i) {
            currentLyricData[i].time = parseFloat(audio.currentTime.toFixed(2));
            document.getElementById(`lyric-time-in-${i}`).value = currentLyricData[i].time;
        }
        function handleTimeInputKey(e, i) {
            if(e.key === 'Enter') {
                e.preventDefault();
                let nextIn = document.getElementById(`lyric-time-in-${i+1}`);
                if(nextIn) { nextIn.focus(); nextIn.select(); }
            }
        }
        function applyMixedColorToLyric(i) {
            currentLyricData[i].colors = [...currentSelectedMembersForLyric];
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const track = playingTracks[currentTrackIdx];
            track.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(track).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                if(document.getElementById('apple-lyrics-view').classList.contains('active')) {
                    renderAppleLyrics();
                }
                loadAll();
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            let loaded = 0;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        let mArts = tag.tags.artist ? tag.tags.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x) : ["Unknown"];
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: tag.tags.artist || "Unknown", 
                            mainArtists: mArts,
                            subArtists: [],
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            lyricData: [],
                            favorite: false 
                        });
                        tx.oncomplete = () => { loaded++; if(loaded === files.length) loadAll(); };
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: "Unknown", 
                            mainArtists: ["Unknown"],
                            subArtists: [],
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            lyricData: [],
                            favorite: false 
                        });
                        tx.oncomplete = () => { loaded++; if(loaded === files.length) loadAll(); };
                    }
                });
            }
        };

        // --- Touch Gestures ---
        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`) || document.querySelector(`#swipe-${id} .setup-mem-item .list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`) || document.querySelector(`#swipe-${id} .setup-mem-item .list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            const q = document.getElementById('queue-panel');
            q.classList.toggle('open'); 
            if(q.classList.contains('open')) renderQueue(); 
        }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx]); toggleQueue();" style="background:var(--card-bg); margin-bottom:10px;">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div><div style="font-weight:800; font-size:14px;">${t.name}</div><div style="font-size:11px; color:var(--icon-color); font-weight:bold;">${formatArtistString(t)}</div></div>
                </div>`).join('') || `<div style="padding:50px; text-align:center; color:var(--sub-text); font-weight:bold;">${t('empty_queue')}</div>`;
        }

        // Add keyboard listener for global actions
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                togglePlay();
            }
        });

        // Initialize UI Strings
        updateUIText();

    </script>
</body>
</html>
