                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || getDisplayArtistStr(parseArtists(t.artist)).toLowerCase().includes(term)));
                    if (activeArtistFilter) filtered = filtered.filter(t => parseArtists(t.artist).map(x=>x.name).includes(activeArtistFilter));

                    if (currentSort === 'name') filtered.sort((a,b) => sortDirections[viewKey] * a.name.localeCompare(b.name));
                    else if (currentSort === 'artist') filtered.sort((a,b) => sortDirections[viewKey] * getDisplayArtistStr(parseArtists(a.artist)).localeCompare(getDisplayArtistStr(parseArtists(b.artist))));
                    else if (currentSort === 'year') filtered.sort((a,b) => sortDirections[viewKey] * (b.year||'').toString().localeCompare((a.year||'').toString()));
                    else if (currentSort === 'added') filtered.sort((a,b) => sortDirections[viewKey] * (b.id - a.id));

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container">
                            <div class="list-item" onclick="playSong(${t.id},'pl')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover||''}" style="margin-right:0;">
                                </div>
                                <div style="flex-grow:1;">
                                    <div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div>
                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${getDisplayArtistStr(parseArtists(t.artist))}</div>
                                </div>
                                ${currentSort==='custom' && pl.id !== -1 ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + (pl.id !== -1 ? `<div style="padding-top:40px; padding-bottom:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background-color:var(--card-bg); color:var(--icon-active); border-top-width:2px; border-right-width:2px; border-bottom-width:2px; border-left-width:2px; border-style:solid; border-color:var(--accent-blue); padding-top:15px; padding-right:30px; padding-bottom:15px; padding-left:30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>` : '');
                }
            }

            if (currentArtist || currentPlaylistId !== null) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }
            
            restoreScroll();
        }

        function renderCards(list, container, sort, dir) {
            if (sort === 'name') list.sort((a,b) => dir * a.name.localeCompare(b.name));
            else if (sort === 'artist') list.sort((a,b) => dir * getDisplayArtistStr(parseArtists(a.artist)).localeCompare(getDisplayArtistStr(parseArtists(b.artist))));
            else if (sort === 'year') list.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
            else if (sort === 'added') list.sort((a,b) => dir * (b.id - a.id));
            
            container.innerHTML = list.map(t => {
                let arts = parseArtists(t.artist);
                let artStr = arts.map(a => {
                    let badge = a.role === 'main' ? 'M' : a.role === 'sub' ? 'S' : 'M/S';
                    return `<span style="white-space:nowrap;">${a.name}<span class="artist-role-badge" style="margin-left:2px;">${badge}</span></span>`;
                }).join(' ');
                
                return `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub" style="flex-direction:column; align-items:flex-start; gap:4px;">
                            <div class="multi-artist-display">${artStr}</div>
                            ${t.year ? `<span class="card-year">${t.year}</span>`:''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl || pl.id === -1) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            
            if(playingTracks.length > 0) {
                let currentPlayingId = playingTracks[currentTrackIdx].id;
                playingTracks = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(x=>x);
                currentTrackIdx = playingTracks.findIndex(x => x.id === currentPlayingId);
                renderQueue();
            }
            
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = render;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[currentView] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        const fPlayer = document.getElementById('full');
        
        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let text = track?.lyrics || "";
                let colors = track?.lyricColors || [];
                let lines = text.split('\n');
                
                let mainColor = "inherit";
                let arts = parseArtists(track.artist);
                let mainArt = arts.find(a => a.role === 'main' || a.role === 'main/sub');
                if(mainArt) {
                    let parent = Object.values(artistMeta).find(m => m.members && m.members.some(mem => mem.linked === mainArt.name));
                    if(parent) {
                        let member = parent.members.find(mem => mem.linked === mainArt.name);
                        if(member && member.color) mainColor = member.color;
                    }
                }
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background-color:rgba(0,0,0,0.1); border-width:0; color:var(--icon-color); padding-top:12px; padding-right:12px; padding-bottom:12px; padding-left:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                
                view.innerHTML = paintBtn + `<div id="lyrics-content-scroll" style="width:100%; height:100%; overflow-y:auto; padding-top:40px;">` + lines.map((l, i) => {
                    let c = colors[i] || mainColor;
                    let style = `color:${c}; width:100%; word-wrap:break-word;`;
                    if(c !== "inherit") {
                        style += `text-shadow: 0 0 10px ${c}; -webkit-text-stroke: 0.5px #fff;`;
                    }
                    return `<div id="lyric-line-${i}" style="${style}" onclick="event.stopPropagation(); seekToLyric(${i})">${l}</div>`;
                }).join('') + `</div>`;
                
                updateLyricHighlight();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
            }
        }
        
        function updateLyricHighlight() {
            const view = document.getElementById('f-lyrics-view');
            if(!view.classList.contains('active')) return;
            
            const track = playingTracks[currentTrackIdx];
            if(!track || !track.lyricTimes || track.lyricTimes.length === 0) return;
            
            let currentLine = -1;
            for(let i=0; i<track.lyricTimes.length; i++) {
                if(audio.currentTime >= track.lyricTimes[i]) {
                    currentLine = i;
                }
            }
            
            const lines = track.lyrics.split('\n');
            for(let i=0; i<lines.length; i++) {
                let el = document.getElementById(`lyric-line-${i}`);
                if(el) {
                    if(i === currentLine) {
                        el.style.transform = "scale(1.1)";
                        el.style.opacity = "1";
                    } else {
                        el.style.transform = "scale(1)";
                        el.style.opacity = "0.5";
                    }
                }
            }
            
            if(currentLine >= 0 && !isSyncingLyrics) {
                let el = document.getElementById(`lyric-line-${currentLine}`);
                let container = document.getElementById('lyrics-content-scroll');
                if(el && container) {
                    container.scrollTo({
                        top: el.offsetTop - container.clientHeight / 2,
                        behavior: 'smooth'
                    });
                }
            }
        }
        
        function seekToLyric(idx) {
            const track = playingTracks[currentTrackIdx];
            if(track && track.lyricTimes && track.lyricTimes[idx] !== undefined) {
                audio.currentTime = track.lyricTimes[idx];
            }
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const arts = parseArtists(playingTracks[currentTrackIdx].artist);
                if(arts.length > 0) openArtist(arts[0].name);
            }, 600); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); 
            div.id="bulk-modal"; 
            div.className="modal"; 
            div.style.display = "flex";
            div.innerHTML = `
                <div class="header"><div class="header-top"><button class="header-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button><h2>Select Songs</h2><button class="header-btn" onclick="saveBulkAdd()" style="font-weight:900;">Done</button></div></div>
                <div class="search-container"><div class="search-bar-row"><input type="text" id="bulk-search-box" class="search-input-field" placeholder="Search track or artist..." oninput="filterBulk(this.value)"></div><div id="bulk-artist-suggestions" class="tag-scroll-container"></div></div>
                <div id="bulk-list" style="flex-grow:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${getDisplayArtistStr(parseArtists(t.artist)).toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                        <div style="flex-grow:1;"><b style="font-size:14px;">${t.name}</b><br><span style="font-size:11px; color:var(--icon-color);">${getDisplayArtistStr(parseArtists(t.artist))}</span></div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => parseArtists(t.artist).map(x=>x.name).includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else { suggest.style.display = 'none'; }
        }

        function switchTab(v) { 
            currentView = v; 
            currentArtist = null; 
            currentPlaylistId = null; 
            isEditing = false; 
            activeArtistFilter = null;
            render(); 
        }
        function openPlaylist(id) { 
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            render(); 
        }
        function openArtist(n) { 
            currentArtist = n; 
            render(); 
        }
        function openFull() { 
            fPlayer.classList.add('active'); 
        }
        function closeFull() { 
            fPlayer.classList.remove('active'); 
        }
        function handleHeaderLeft() { 
            if(currentArtist) currentArtist = null; 
            else if(currentPlaylistId !== null) currentPlaylistId = null; 
            else isEditing = !isEditing; 
            render(); 
        }
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => parseArtists(t.artist).map(x=>x.name).includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId !== null && currentPlaylistId !== -1) {
                openBulkAddModal();
            }
            else if(currentView === 'library') {
                const addMethod = prompt("Type 'url' to add dummy song, or 'file' to upload local file", "file");
                if(addMethod === 'file') {
                    document.getElementById('audio-upload').click(); 
                } else if(addMethod === 'url') {
                    const tx = db.transaction("songs", "readwrite");
                    tx.objectStore("songs").add({ name: "Dummy URL Track", artist: JSON.stringify([{name:"Unknown", role:"main"}]), year: "2026", cover: null, data: null, lyrics: "Line 1\nLine 2\nLine 3", favorite: false });
                    tx.oncomplete = () => loadAll();
                }
            } 
            else if(currentView === 'playlist') { 
                const n = prompt("Playlist Name:"); 
                if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null }).onsuccess = loadAll; 
            } 
            else if(currentView === 'artists') { 
                const n = prompt("Artist Name:"); 
                if(n) {
                    let newPrompt = prompt("Is this a group? (yes/no)", "no");
                    let members = [];
                    if(newPrompt === 'yes') {
                        members = [{name:"Member1", color:"#ff0000", linked:null}];
                    }
                    db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, members: members }).onsuccess = loadAll; 
                }
            }
        }
        
        function togglePlay() { 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(audio.paused) {
                playWithFade();
            } else {
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                setTimeout(() => { audio.pause(); }, 300);
            }
        }

        function nextTrack() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function prevTrack() { 
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }
        
        function playSong(id, mode) {
            initAudio();
            let original = [];
            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                let dir = sortDirections[viewKey];
                let s = sortStates[viewKey];
                if (s === 'name') original.sort((a,b) => dir * a.name.localeCompare(b.name));
                else if (s === 'artist') original.sort((a,b) => dir * getDisplayArtistStr(parseArtists(a.artist)).localeCompare(getDisplayArtistStr(parseArtists(b.artist))));
                else if (s === 'year') original.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
            } else if(mode === 'art') {
                original = tracks.filter(tx => parseArtists(tx.artist).map(x=>x.name).includes(currentArtist));
                let dir = sortDirections[viewKey];
                let s = sortStates[viewKey];
                if (s === 'name') original.sort((a,b) => dir * a.name.localeCompare(b.name));
                else if (s === 'year') original.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
                else if (s === 'added') original.sort((a,b) => dir * (b.id - a.id));
            } else {
                original = [...tracks];
                let dir = sortDirections[viewKey];
                let s = sortStates[viewKey];
                if (s === 'name') original.sort((a,b) => dir * a.name.localeCompare(b.name));
                else if (s === 'artist') original.sort((a,b) => dir * getDisplayArtistStr(parseArtists(a.artist)).localeCompare(getDisplayArtistStr(parseArtists(b.artist))));
                else if (s === 'year') original.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
                else if (s === 'added') original.sort((a,b) => dir * (b.id - a.id));
            }
            
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            if(audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
            
            if(t.data) {
                audio.src = URL.createObjectURL(t.data);
            } else {
                audio.src = ""; 
            }
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = getDisplayArtistStr(parseArtists(t.artist));
            document.getElementById('mini').style.display = 'flex';
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            updateMediaSession(t);
            renderQueue();
            
            if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                toggleLyrics();
                toggleLyrics();
            }
            
            playWithFade();
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            } else {
                el.innerText = text;
            }
        }

        function formatTime(s) { 
            if(isNaN(s)) return "0:00";
            let m=Math.floor(s/60), sec=Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }

        function handleSeek(val) {
            audio.currentTime = val;
            updateLyricHighlight();
        }

        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                updateLyricHighlight();
            } 
        };
        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };
        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };
        audio.onended = () => { nextTrack(); };

        function renderTrackArtists() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists.map((a, idx) => `
                <div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">
                    ${a.name} <span class="artist-role-badge">${a.role}</span>
                    <i class="fa-solid fa-xmark" onclick="removeTrackArtist(${idx})" style="cursor:pointer; font-size:12px; opacity:0.7;"></i>
                </div>`).join('');
        }
        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const roleEl = document.getElementById('edit-artist-role');
            const val = el.value.trim();
            if(val && !currentTrackArtists.some(x => x.name === val)) {
                currentTrackArtists.push({ name: val, role: roleEl.value });
                el.value = '';
                renderTrackArtists();
            }
        }
        function removeTrackArtist(idx) {
            currentTrackArtists.splice(idx, 1);
            renderTrackArtists();
        }

        function handleLyricsPaste(e) {
            const text = e.target.value;
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            e.target.value = lines.join('\n');
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = parseArtists(t.artist);
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = stringifyArtists(currentTrackArtists);
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }
        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
            if(playingTracks.length > 0) {
                let currentPlayingId = playingTracks[currentTrackIdx].id;
                if(isShuffle) {
                    playingTracks.sort(() => Math.random() - 0.5);
                } else {
                    const pl = currentPlaylistId !== null ? playlists.find(p => p.id === currentPlaylistId) : null;
                    if(pl) {
                        playingTracks = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                    } else if(currentArtist) {
                        playingTracks = tracks.filter(tx => parseArtists(tx.artist).map(x=>x.name).includes(currentArtist));
                    } else {
                        playingTracks = [...tracks];
                    }
                }
                currentTrackIdx = playingTracks.findIndex(x => x.id === currentPlayingId);
                renderQueue();
            }
        }
        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }
        function deleteSong(id) { 
            if(confirm("Delete this track?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; 
        }
        function deletePlaylist(id) { 
            if(id === -1) return;
            if(confirm("Delete this playlist?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; 
        }
        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl.id === -1) return;
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }
        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl.id === -1) return;
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').remove(); 
            }; 
        }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }
        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function openPlEdit(id) { 
            if(id === -1) return;
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }
        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag && p.tag !== "auto") p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }
        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }
        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [] };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, members: [] };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding-top:10px; padding-right:20px; padding-bottom:10px; padding-left:20px; background-color:var(--icon-color); color:#ffffff; border-width:0; border-radius:15px; font-weight:800;">+ Add Member</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container" style="margin-bottom:10px; border-radius:15px;">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" style="display:flex; gap:10px; align-items:center; background-color:var(--card-bg); border-radius:15px; padding-top:10px; padding-right:15px; padding-bottom:10px; padding-left:15px;">
                                <select onchange="currentMembersEdit[${i}].linked=this.value" class="sort-select" style="max-width:80px;">
                                    <option value="">Link...</option>
                                    ${getAllArtists().map(art => `<option value="${art}" ${m.linked===art?'selected':''}>${art}</option>`).join('')}
                                </select>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border-width:0; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex-grow:1; padding-top:10px; padding-bottom:10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'#a6cbe3', linked: null}); 
            renderArtistSetup(); 
        }
        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(); 
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                tracks.forEach(t => {
                    let arts = parseArtists(t.artist);
                    let changed = false;
                    for(let i=0; i<arts.length; i++) { 
                        if(arts[i].name === oldName) { 
                            arts[i].name = newName; 
                            changed = true; 
                        } 
                    }
                    if(changed) { 
                        t.artist = stringifyArtists(arts); 
                        store.put(t); 
                        tracksChanged = true; 
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let allMembers = [];
            let arts = parseArtists(t.artist);
            arts.forEach(a => {
                if(artistMeta[a.name] && artistMeta[a.name].members) {
                    allMembers = allMembers.concat(artistMeta[a.name].members);
                }
            });
            allMembers.push({name: 'Reset', color: ''});

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            currentLyricColors = t.lyricColors ? [...t.lyricColors] : [];
            currentLyricTimes = t.lyricTimes ? [...t.lyricTimes] : [];
            isSyncingLyrics = false;
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="selectPaintColor('${m.color || ''}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div class="lyric-color-icon" style="background-color:${m.color || '#cccccc'}; border-color:${m.color?m.color:'var(--border-color)'};"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow-x:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }
        
        function selectPaintColor(c) {
            currentPaintColor = c;
            const icons = document.querySelectorAll('.lyric-color-icon');
            icons.forEach(icon => {
                if(icon.style.backgroundColor === c || (c==='' && icon.style.backgroundColor === 'rgb(204, 204, 204)')) {
                    icon.classList.add('selected');
                } else {
                    icon.classList.remove('selected');
                }
            });
        }
        
        function renderPaintLyrics() {
            const t = playingTracks[currentTrackIdx];
            const lines = (t.lyrics || '').split('\n');
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = lines.map((l, i) => `
                <div id="paint-line-${i}" onclick="handlePaintLineClick(${i})" style="padding-top:15px; padding-right:15px; padding-bottom:15px; padding-left:15px; border-radius:12px; background-color:var(--input-bg); color:${currentLyricColors[i] || 'var(--text-main)'}; border-left-width:6px; border-left-style:solid; border-left-color:${currentLyricColors[i] || 'transparent'}; cursor:pointer; font-weight:800; text-align:center;">
                    ${l || '<span style="color:#cccccc; font-size:12px;">(empty line)</span>'}
                    <div style="font-size:9px; color:var(--icon-color); margin-top:5px;">Time: ${formatTime(currentLyricTimes[i] || 0)}</div>
                </div>
            `).join('');
        }
        
        function handlePaintLineClick(i) {
            if(isSyncingLyrics) {
                currentLyricTimes[i] = audio.currentTime;
                const el = document.getElementById(`paint-line-${i}`);
                if(el) {
                    el.style.backgroundColor = "var(--accent-blue)";
                    setTimeout(() => { el.style.backgroundColor = "var(--input-bg)"; }, 300);
                }
                renderPaintLyrics();
            } else {
                applyLyricColor(i);
            }
        }
        
        function syncLyricTimestamps() {
            isSyncingLyrics = !isSyncingLyrics;
            if(isSyncingLyrics) {
                alert("Now play the song and tap the lyric lines to set timestamps.");
                if(audio.paused) togglePlay();
            } else {
                alert("Sync mode off.");
            }
        }
        
        function applyLyricColor(i) {
            currentLyricColors[i] = currentPaintColor;
            renderPaintLyrics();
        }
        
        function saveLyricFadeTime(val) {
            document.documentElement.style.setProperty('--lyric-fade-time', val + 's');
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricColors = currentLyricColors;
            t.lyricTimes = currentLyricTimes;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    toggleLyrics();
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        let parsedArtistStr = JSON.stringify([{name: tag.tags.artist || "Unknown", role: "main"}]);
                        tx.objectStore("songs").add({ name: tag.tags.title || f.name, artist: parsedArtistStr, year: tag.tags.year || "", cover: c, data: f, lyrics: "", favorite: false });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        let parsedArtistStr = JSON.stringify([{name: "Unknown", role: "main"}]);
                        tx.objectStore("songs").add({ name: f.name, artist: parsedArtistStr, year: "", cover: null, data: f, lyrics: "", favorite: false });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${getDisplayArtistStr(parseArtists(t.artist))}</div>
                    </div>
                </div>`).join('') || '<div style="padding-top:50px; text-align:center; color:#cccccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
