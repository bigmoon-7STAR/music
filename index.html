                                <div class="swipe-container" id="swipe-art-${CSS.escape(c.name)}">
                                    <div class="artist-child-list-item" onclick="openArtist('${c.name}')">
                                        <div class="artist-child-container">${cIcon}</div>
                                        <div style="font-weight:700; font-size:14px; flex:1;">${c.name}</div>
                                        <i class="fa-solid fa-chevron-right" style="font-size:10px; color:var(--sub-text);"></i>
                                    </div>
                                </div>`;
                            });
                        }
                    });
                    display.innerHTML = htmlStr;
                    
                } else {
                    title.innerText = currentArtist; 
                    display.className = "grid";
                    let list = tracks.filter(t => parseArtists(t.artist).map(x=>x.name).includes(currentArtist));
                    
                    if (searchTerms.length > 0) {
                        list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    }
                    renderCards(list, display, currentSort, currentDir);
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = dict.playlist; 
                    display.className = "grid";
                    
                    let autoFavs = playlists.find(p => p.tag === "auto" && p.favorite === true);
                    if(autoFavs) {
                        let favTracks = tracks.filter(t => t.favorite);
                        autoFavs.songIds = favTracks.map(t => t.id);
                    }

                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag && p.tag !== "auto") p.tag.split(/[,、]/).forEach(tg => {
                            const tr = tg.trim(); 
                            if(tr && !allTags.includes(tr)) allTags.push(tr);
                        });
                    });
                    
                    if (searchTerms.length > 0) {
                        const matchedTags = allTags.filter(t => searchTerms.every(term => t.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(t => `<div class="tag-chip" onclick="applyTagFilter('${t}')">#${t}</div>`).join('');
                        }
                    }
                    let list = playlists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));

                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = (p.tag && p.tag !== "auto") ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        const starHtml = p.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : '';
                        
                        return `
                        <div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            ${p.tag !== 'auto' ? `<div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>` : ''}
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img" alt="pl cover">
                            ${starHtml}
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; 
                    display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => { 
                        if(s.artist) artistsInPlRaw.push(...parseArtists(s.artist).map(x=>x.name));
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && searchTerms.length > 0) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => parseArtists(t.artist).map(x=>x.name).includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    if (searchTerms.length > 0) {
                        filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || t.artist.toLowerCase().includes(term)));
                    }
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => parseArtists(t.artist).map(x=>x.name).includes(activeArtistFilter));
                    }

                    if (currentSort === 'name') filtered.sort((a,b) => currentDir * a.name.localeCompare(b.name,'ja'));
                    else if (currentSort === 'year') filtered.sort((a,b) => currentDir * (b.year||'').toString().localeCompare((a.year||'').toString()));
                    else if (currentSort === 'artist') filtered.sort((a,b) => currentDir * a.artist.localeCompare(b.artist,'ja'));
                    
                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">${dict.remove}</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover||''}" style="margin-right:0;" alt="cover">
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div>
                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${renderArtistStringUI(parseArtists(t.artist))}</div>
                                </div>
                                ${currentSort==='custom' && pl.tag !== 'auto' ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('');
                        
                    if(pl.tag !== 'auto') {
                        display.innerHTML += `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">${dict.addTrack}</button></div>`;
                    }
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }

            requestAnimationFrame(() => {
                const el = document.getElementById('content');
                if(el && scrollPositions[viewKey]) {
                    el.scrollTop = scrollPositions[viewKey];
                }
            });
        }

        function renderCards(list, container, sort, dir) {
            if (sort === 'name') list.sort((a,b) => dir * a.name.localeCompare(b.name,'ja'));
            else if (sort === 'year') list.sort((a,b) => dir * (b.year||'').toString().localeCompare((a.year||'').toString()));
            else if (sort === 'artist') list.sort((a,b) => dir * a.artist.localeCompare(b.artist,'ja'));
            else if (sort === 'added') list.sort((a,b) => dir * (b.id - a.id));
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img" alt="cover">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${renderArtistStringUI(parseArtists(t.artist))} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            const key = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            searchQueries[key] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function deleteCustomArtist(a) {
            if(confirm(`${i18n[currentLang].del} '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
        });

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let text = track?.lyrics || "";
                let colors = track?.lyricColors || [];
                let lines = text.split('\n');
                
                let fadeTimeStr = localStorage.getItem('lyricFadeTime') || '0.5';
                let fadeTime = parseFloat(fadeTimeStr);
                
                lyricLineTimestamps = [];
                for(let i=0; i<lines.length; i++) {
                    lyricLineTimestamps.push(i * fadeTime); 
                }
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                
                view.innerHTML = paintBtn + `<div id="lyrics-content-scroll" style="width:100%; height:100%; padding-top:40%; padding-bottom: 50%;">` + 
                    lines.map((l, i) => {
                        let colorDef = colors[i];
                        let styleStr = "";
                        if(colorDef && colorDef.includes(',')) {
                            styleStr = `--main-color: ${colorDef.split(',')[0]}; --sub-color: ${colorDef.split(',')[1]};`;
                        } else if(colorDef) {
                            styleStr = `--main-color: ${colorDef}; --sub-color: ${colorDef};`;
                        } else {
                            styleStr = `--main-color: var(--text-dark); --sub-color: var(--text-dark);`;
                        }
                        return `<div class="lyric-line" id="lyric-line-${i}" style="${styleStr}" onclick="event.stopPropagation(); seekAudio(${lyricLineTimestamps[i]})">${l}</div>`;
                    }).join('') + `</div>`;
                    
                lyricLineSyncIndex = -1;
                syncLyricsWithTime(audio.currentTime);
                
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
            }
        }

        function syncLyricsWithTime(time) {
            const view = document.getElementById('f-lyrics-view');
            if(!view.classList.contains('active')) return;
            
            let newIdx = -1;
            for(let i = lyricLineTimestamps.length - 1; i >= 0; i--) {
                if(time >= lyricLineTimestamps[i]) {
                    newIdx = i;
                    break;
                }
            }
            
            if(newIdx !== lyricLineSyncIndex) {
                if(lyricLineSyncIndex !== -1) {
                    let oldEl = document.getElementById(`lyric-line-${lyricLineSyncIndex}`);
                    if(oldEl) oldEl.classList.remove('active');
                }
                lyricLineSyncIndex = newIdx;
                if(newIdx !== -1) {
                    let newEl = document.getElementById(`lyric-line-${newIdx}`);
                    if(newEl) {
                        newEl.classList.add('active');
                        let scrollContainer = document.getElementById('lyrics-content-scroll');
                        let scrollPos = newEl.offsetTop - (view.clientHeight / 2) + (newEl.clientHeight / 2);
                        scrollContainer.scrollTo({ top: scrollPos, behavior: 'smooth' });
                    }
                }
            }
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const arts = parseArtists(playingTracks[currentTrackIdx].artist);
                if(arts.length > 0) openArtist(arts[0].name);
            }, 800); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); 
            div.id="bulk-modal"; 
            div.className="modal"; 
            div.style.display = "flex";
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                        <h2>Select Songs</h2>
                        <button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">${i18n[currentLang].done}</button>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions"></div>
                </div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist.toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;" alt="cover">
                        <div style="flex:1;">
                            <b style="font-size:14px;">${t.name}</b><br>
                            <span style="font-size:11px; color:var(--icon-color);">${renderArtistStringUI(parseArtists(t.artist))}</span>
                        </div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => parseArtists(t.artist).map(x=>x.name).includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else { 
                suggest.style.display = 'none'; 
            }
        }

        function switchTab(v) { 
            currentView = v; 
            currentArtist = null; 
            currentPlaylistId = null; 
            isEditing = false; 
            activeArtistFilter = null;
            render(); 
        }

        function openPlaylist(id) { 
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            sortStates.playlistDetail = 'year'; 
            render(); 
        }

        function openArtist(n) { 
            currentArtist = n; 
            render(); 
        }

        function openFull() { 
            fPlayer.classList.add('active'); 
            fPlayer.style.transform = 'translateY(0)'; 
        }

        function closeFull() { 
            fPlayer.classList.remove('active'); 
            fPlayer.style.transform = 'translateY(100%)'; 
        }

        function handleHeaderLeft() { 
            if(currentArtist) currentArtist = null; 
            else if(currentPlaylistId) currentPlaylistId = null; 
            else isEditing = !isEditing; 
            render(); 
        }

        let sysModalCallback = null;
        function customPrompt(title, callback) {
            document.getElementById('sys-modal-title').innerText = title;
            document.getElementById('sys-modal-input').value = "";
            document.getElementById('sys-modal-wrapper').style.display = 'flex';
            sysModalCallback = callback;
        }

        function closeSysModal(isOk) {
            document.getElementById('sys-modal-wrapper').style.display = 'none';
            if(isOk && sysModalCallback) {
                sysModalCallback(document.getElementById('sys-modal-input').value);
            }
            sysModalCallback = null;
        }

        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => parseArtists(t.artist).map(x=>x.name).includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId) {
                openBulkAddModal();
            }
            else if(currentView === 'library') {
                document.getElementById('audio-upload').click(); 
            }
            else if(currentView === 'playlist') { 
                customPrompt(i18n[currentLang].sysPromptPl, (n) => {
                    if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null, favorite: false }).onsuccess = loadAll;
                });
            } 
            else if(currentView === 'artists') { 
                customPrompt(i18n[currentLang].sysPromptArt, (n) => {
                    if(n) db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, favorite: false, members: [], syncColor: '' }).onsuccess = loadAll;
                });
            }
        }

        function togglePlay() { 
            if(audio.paused) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                audio.play();
            } else {
                audio.pause();
            }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { audio.pause(); audio.currentTime = 0; return; }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }

        async function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => parseArtists(tx.artist).map(x=>x.name).includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            await loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        async function loadTrack(t) {
            if(!t) return;
            try {
                if(audioCtx.state === 'suspended') await audioCtx.resume();
                if(audio.src) URL.revokeObjectURL(audio.src);
                audio.src = URL.createObjectURL(t.data);
                document.getElementById('m-img').src = t.cover || ''; 
                checkMarquee('m-title', t.name);
                document.getElementById('f-img').src = t.cover || ''; 
                checkMarquee('f-title', t.name); 
                document.getElementById('f-artist').innerText = renderArtistStringUI(parseArtists(t.artist));
                document.getElementById('mini').style.display = 'flex';
                document.getElementById('f-lyrics-view').classList.remove('active');
                document.getElementById('f-img').style.opacity = "1";
                updateFavBtn(t.favorite);
                updatePlayerBlurBg();
                
                let p = audio.play();
                if(p !== undefined) {
                    p.catch(e => {
                        console.error("Auto-play prevented", e);
                        document.getElementById('m-pp').className = 'fa-solid fa-play';
                        document.getElementById('f-pp').className = 'fa-solid fa-play';
                    });
                }
            } catch(e) {
                console.error(e);
            }
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            else el.innerText = text;
        }

        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };
        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };
        audio.onended = () => { next(); };

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const t = playingTracks[currentTrackIdx];
                if(!t) return;
                
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.name,
                    artist: renderArtistStringUI(parseArtists(t.artist)),
                    album: 'Pure Wish Library',
                    artwork: t.cover ? [{ src: t.cover, sizes: '512x512', type: 'image/png' }] : []
                });

                navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
                navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
                navigator.mediaSession.setActionHandler('previoustrack', () => { prev(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { next(); });
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    if (details.fastSeek && 'fastSeek' in audio) {
                        audio.fastSeek(details.seekTime);
                    } else {
                        audio.currentTime = details.seekTime;
                    }
                    syncLyricsWithTime(details.seekTime);
                });
            }
        }

        function renderTrackArtists() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists.map((a, i) => `
                <div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">
                    <span onclick="toggleTrackArtistType(${i})" style="cursor:pointer; border-bottom:1px dashed var(--icon-active);">${a.type}</span>: ${a.name}
                    <i class="fa-solid fa-xmark" onclick="removeTrackArtist(${i})" style="cursor:pointer; font-size:12px; opacity:0.7;"></i>
                </div>
            `).join('');
        }
        
        function toggleTrackArtistType(index) {
            currentTrackArtists[index].type = currentTrackArtists[index].type === 'Main' ? 'Sub' : 'Main';
            renderTrackArtists();
        }

        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if(val) {
                let parts = val.split(',');
                parts.forEach(p => {
                    let name = p.trim();
                    if(name && !currentTrackArtists.find(x => x.name === name)) {
                        currentTrackArtists.push({ name: name, type: 'Main' });
                    }
                });
                el.value = '';
                renderTrackArtists();
            }
        }

        function removeTrackArtist(i) {
            currentTrackArtists.splice(i, 1);
            renderTrackArtists();
        }

        function stringifyTrackArtists(arr) {
            let parts = [];
            let currentStr = "";
            for(let i=0; i<arr.length; i++) {
                if(i===0) {
                    currentStr = arr[i].name;
                } else {
                    if(arr[i].type === 'Sub') {
                        currentStr += `; ${arr[i].name}`;
                    } else {
                        parts.push(currentStr);
                        currentStr = arr[i].name;
                    }
                }
            }
            if(currentStr) parts.push(currentStr);
            return parts.join(', ');
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = parseArtists(t.artist);
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }

        function closeEdit() { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }

        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = stringifyTrackArtists(currentTrackArtists);
            t.year = document.getElementById('edit-year').value; 
            
            let rawLyrics = document.getElementById('edit-lyrics').value;
            t.lyrics = rawLyrics.split('\n').map(l => l.trim()).join('\n');
            
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
            }; 
        }

        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
        }

        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function deleteSong(id) { 
            if(confirm("Delete this track?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; 
        }

        function deletePlaylist(id) { 
            if(confirm("Delete this playlist?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; 
        }

        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }

        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').remove(); 
            }; 
        }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }

        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function togglePlFav() {
            tempPlFav = !tempPlFav;
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            if(tempPlFav) {
                icon.className = 'fa-solid fa-star star-icon active';
            } else {
                icon.className = 'fa-regular fa-star star-icon';
            }
        }

        function openPlEdit(id) { 
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            tempPlFav = pl.favorite || false;
            
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }

        function closePlEdit() { 
            document.getElementById('pl-edit-modal').style.display = 'none'; 
        }

        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            pl.favorite = tempPlFav;
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag && p.tag !== 'auto') p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); 
                    if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }

        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }

        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, favorite: false, members: [], syncColor: '' };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [], syncColor: '' };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup(meta.syncColor);
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }

        function renderArtistSetup(syncCol = '') {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">${i18n[currentLang].addMem}</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">${i18n[currentLang].del}</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px; cursor:pointer; padding:0;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'#000000', linked: null}); 
            renderArtistSetup(''); 
        }

        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(''); 
        }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { 
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move'; 
        }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup('');
            }
        }
        function handleDragEnd(e) { 
            e.target.classList.remove('dragging'); 
            draggedMemIndex = -1; 
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">${i18n[currentLang].unlink}</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                renderArtistSetup('');
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let changed = false;
                    let arts = parseArtists(t.artist);
                    arts.forEach(a => {
                        if(a.name === oldName) {
                            a.name = newName;
                            changed = true;
                        }
                    });
                    if(changed) { 
                        t.artist = stringifyTrackArtists(arts); 
                        store.put(t); 
                        tracksChanged = true; 
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let allMembers = [];
            let arts = parseArtists(t.artist);
            arts.forEach(a => {
                let meta = artistMeta[a.name];
                if(meta && meta.members) {
                    allMembers = allMembers.concat(meta.members);
                } else if (meta && meta.syncColor) {
                    allMembers.push({name: a.name, color: meta.syncColor});
                } else {
                    allMembers.push({name: a.name, color: '#a6cbe3'});
                }
            });
            allMembers.push({name: 'Reset', color: ''});

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            currentLyricColors = t.lyricColors ? [...t.lyricColors] : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="currentPaintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || 'var(--text-main)'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function renderPaintLyrics() {
            const t = playingTracks[currentTrackIdx];
            const lines = (t.lyrics || '').split('\n');
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = lines.map((l, i) => {
                let colorDef = currentLyricColors[i];
                let bgStyle = "";
                let textStyle = "";
                if(colorDef && colorDef.includes(',')) {
                    bgStyle = `background: -webkit-linear-gradient(left, ${colorDef.split(',')[0]}, ${colorDef.split(',')[1]}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                } else if (colorDef) {
                    textStyle = `color: ${colorDef};`;
                } else {
                    textStyle = `color: var(--text-main);`;
                }
                
                return `
                <div onclick="applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:var(--card-bg); border:1px solid rgba(0,0,0,0.05); cursor:pointer; font-weight:800; text-align:center;">
                    <span style="${bgStyle} ${textStyle}">${l || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}</span>
                </div>
            `;}).join('');
        }

        function applyLyricColor(i) {
            let exist = currentLyricColors[i];
            if(exist && currentPaintColor && exist !== currentPaintColor && !exist.includes(',')) {
                currentLyricColors[i] = `${exist},${currentPaintColor}`;
            } else {
                currentLyricColors[i] = currentPaintColor;
            }
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricColors = currentLyricColors;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "Unknown", year: tag.tags.year || "", cover: c, data: f, lyrics: "", favorite: false });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: f.name, artist: "Unknown", year: "", cover: null, data: f, lyrics: "", favorite: false });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { 
            if(isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }

        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`) || document.querySelector(`#swipe-${id} .artist-child-list-item`) || document.querySelector(`#swipe-${id} .setup-mem-item .list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }

        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`) || document.querySelector(`#swipe-${id} .artist-child-list-item`) || document.querySelector(`#swipe-${id} .setup-mem-item .list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }

        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if(nextTracks.length > 0) {
                list.innerHTML = nextTracks.map((t, i) => `
                    <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                        <img src="${t.cover||''}" style="width:40px; height:40px;" alt="cover">
                        <div>
                            <div style="font-weight:800;">${t.name}</div>
                            <div style="font-size:11px; color:var(--icon-color);">${renderArtistStringUI(parseArtists(t.artist))}</div>
                        </div>
                    </div>`).join('');
            } else {
                list.innerHTML = `<div style="padding:50px; text-align:center; color:var(--sub-text);">${i18n[currentLang].qEmpty}</div>`;
            }
        }
    </script>
</body>
</html>
