<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio ✧ Wishcore</title>
    <link rel="apple-touch-icon" href="IMG_8755.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --key-color: #ff85a2;
            --sub-pink: #ffe4e9;
            --text-main: #5d5d7a;
            --glass: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, "SF Pro Display", sans-serif;
            background: #f5f7fa;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #e8ecf9 50%, #fdf2f8 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
        }

        .header { padding: calc(45px + env(safe-area-inset-top)) 20px 10px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.05); z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { font-size: 18px; font-weight: 800; margin: 0; }

        .search-container { padding: 10px 20px; display: flex; gap: 10px; align-items: center; }
        #search-input { flex: 1; padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.4); outline: none; font-size: 14px; }
        .sort-select { background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.8); border-radius: 10px; padding: 8px; font-size: 12px; color: var(--text-main); outline: none; }

        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        
        .card { position: relative; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.96); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-title { margin-top: 8px; font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-sub { font-size: 11px; opacity: 0.7; }

        .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
        .list-item img { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; object-fit: cover; }

        /* モーダル */
        .modal { position: fixed; inset: 0; background: #fff; z-index: 9000; display: none; flex-direction: column; }
        .modal.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-body { padding: 20px; overflow-y: auto; }
        .edit-label { font-size: 12px; font-weight: 800; margin-bottom: 5px; display: block; opacity: 0.6; }
        .edit-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--sub-pink); margin-bottom: 20px; outline: none; font-size: 16px; }

        .mini-player { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom)); left: 15px; right: 15px; height: 65px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 20px; display: none; align-items: center; padding: 0 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 2000; border: 1px solid #fff; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: calc(70px + env(safe-area-inset-bottom)); background: var(--glass); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.05); z-index: 1000; }
        .tab-item { border:none; background:none; color: #b0b0c0; font-weight: 800; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .tab-item.active { color: var(--key-color); }
        .tab-item i { font-size: 20px; }

        #left-btn, #right-btn { color: var(--key-color); font-weight: 800; background: none; border: none; font-size: 15px; }
        .del-badge { position: absolute; top: -5px; left: -5px; width: 22px; height: 22px; background: #ff3b30; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; border: 2px solid #fff; }
        .editing .del-badge { display: flex; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" onclick="handleHeaderLeft()">編集</button>
            <h2 id="view-title">Library</h2>
            <button id="right-btn" onclick="handleHeaderRight()"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="検索..." oninput="render()">
        <select id="sort-type" class="sort-select" onchange="render()">
            <option value="added">追加順</option>
            <option value="year">発行日順</option>
        </select>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src="" style="width:45px; height:45px; border-radius:10px; margin-right:12px; object-fit:cover;">
        <div style="flex:1; overflow:hidden;"><div id="m-title" style="font-weight:800; font-size:14px; white-space:nowrap; color:#333;"></div></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:20px; color:var(--key-color); padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div id="edit-modal" class="modal">
        <div class="header" style="background:#fff;"><div class="header-top"><button onclick="closeEdit()">閉じる</button><h2>情報を編集</h2><button onclick="saveEdit()" style="color:var(--key-color);">保存</button></div></div>
        <div class="modal-body">
            <span class="edit-label">タイトル</span>
            <input type="text" id="edit-name" class="edit-input">
            <span class="edit-label">アーティスト</span>
            <input type="text" id="edit-artist" class="edit-input">
            <span class="edit-label">発行日 (Year)</span>
            <input type="number" id="edit-year" class="edit-input" placeholder="2026">
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" id="tab-lib" onclick="switchTab('library')"><i class="fa-solid fa-heart"></i><span>ライブラリ</span></button>
        <button class="tab-item" id="tab-artist" onclick="switchTab('artists')"><i class="fa-solid fa-user-pen"></i><span>アーティスト</span></button>
        <button class="tab-item" id="tab-play" onclick="switchTab('playlist')"><i class="fa-solid fa-compact-disc"></i><span>リスト</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], isEditing = false, currentView = 'library', currentArtist = null, currentPlaylistId = null;
        let editingId = null;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudio_Wishcore_DB", 3);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-type').value;

            document.getElementById('tab-lib').classList.toggle('active', currentView === 'library');
            document.getElementById('tab-artist').classList.toggle('active', currentView === 'artists');
            document.getElementById('tab-play').classList.toggle('active', currentView === 'playlist');

            if (currentView === 'library') {
                title.innerText = "Library"; display.className = "grid";
                let list = tracks.filter(t => t.name.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search));
                if(sort === 'year') list.sort((a,b) => (b.year||0) - (a.year||0));
                display.innerHTML = list.map(t => `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id})"><div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-minus"></i></div><img src="${t.cover||''}" class="card-img"><div class="card-title">${t.name}</div><div class="card-sub">${t.artist} ${t.year ? `(${t.year})` : ''}</div></div>`).join('');
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = "Artists"; display.className = "";
                    let artists = [...new Set(tracks.map(t => t.artist))].sort();
                    display.innerHTML = artists.map(a => `<div class="list-item" onclick="openArtist('${a}')"><div style="width:50px; height:50px; border-radius:50%; background:var(--sub-pink); display:flex; align-items:center; justify-content:center; margin-right:15px; color:var(--key-color);"><i class="fa-solid fa-user"></i></div><div style="font-weight:800;">${a}</div></div>`).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => t.artist === currentArtist);
                    display.innerHTML = list.map(t => `<div class="card" onclick="playSong(${t.id})"><img src="${t.cover||''}" class="card-img"><div class="card-title">${t.name}</div><div class="card-sub">${t.year || ''}</div></div>`).join('');
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = "Playlists"; display.className = "grid";
                    display.innerHTML = playlists.map(p => `<div class="card ${isEditing?'editing':''}" onclick="isEditing?deletePlaylist(${p.id}):openPlaylist(${p.id})"><div class="del-badge"><i class="fa-solid fa-minus"></i></div><div class="card-img" style="background:var(--sub-pink); display:flex; align-items:center; justify-content:center; color:var(--key-color); font-size:40px;"><i class="fa-solid fa-music"></i></div><div class="card-title">${p.name}</div></div>`).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    display.innerHTML = plSongs.map(t => `<div class="list-item" onclick="playSong(${t.id})"><img src="${t.cover||''}"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:12px; color:var(--key-color);">${t.artist}</div></div></div>`).join('');
                }
            }
            document.getElementById('left-btn').innerText = (currentArtist || currentPlaylistId) ? "戻る" : (isEditing ? "完了" : "編集");
        }

        // 編集機能
        function openEdit(id) {
            editingId = id;
            const t = tracks.find(x => x.id === id);
            document.getElementById('edit-name').value = t.name;
            document.getElementById('edit-artist').value = t.artist;
            document.getElementById('edit-year').value = t.year || "";
            document.getElementById('edit-modal').classList.add('active');
        }
        function closeEdit() { document.getElementById('edit-modal').classList.remove('active'); }
        function saveEdit() {
            const t = tracks.find(x => x.id === editingId);
            t.name = document.getElementById('edit-name').value;
            t.artist = document.getElementById('edit-artist').value;
            t.year = document.getElementById('edit-year').value;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); };
        }

        function playSong(id) {
            const t = tracks.find(x => x.id === id);
            if(!t) return;
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('mini').style.display = 'flex';
            audio.play();
        }

        function openArtist(name) { currentArtist = name; render(); }
        function openPlaylist(id) { currentPlaylistId = id; render(); }
        function handleHeaderLeft() {
            if (currentArtist) currentArtist = null;
            else if (currentPlaylistId) currentPlaylistId = null;
            else isEditing = !isEditing;
            render();
        }
        function handleHeaderRight() {
            if (currentView === 'library') document.getElementById('audio-upload').click();
            else if (currentView === 'playlist') { const n = prompt("リスト名"); if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({name:n, songIds:[]}).oncomplete = loadAll; }
        }
        function switchTab(v) { currentView = v; currentArtist = null; currentPlaylistId = null; isEditing = false; render(); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => document.getElementById('m-pp').className = 'fa-solid fa-pause';
        audio.onpause = () => document.getElementById('m-pp').className = 'fa-solid fa-play';

        document.getElementById('audio-upload').onchange = (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({
                        name: tag.tags.title || f.name,
                        artist: tag.tags.artist || "不明",
                        year: tag.tags.year || "",
                        cover: c,
                        data: f
                    }).oncomplete = loadAll;
                }});
            }
        };
    </script>
</body>
</html>
